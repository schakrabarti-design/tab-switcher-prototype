<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Som — Tab Switcher Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: white;
    --color-text: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.5);
    --color-border: rgba(0,0,0,0.1);
    --color-hover: rgba(0,0,0,0.05);
    --canvas-bg: #f5f5f5;
    --tabstrip-bg: rgba(255,255,255,0.64);
    --font: 'Inter', sans-serif;
    --color-ring: rgba(0,0,0,0.3);
    --color-card-border: rgba(0,0,0,0.09);
    --color-card-selected: rgba(0,0,0,0.5);
    --color-page-active: rgba(0,0,0,0.06);
    --color-sub-tab: rgba(255,255,255,0.45);
    --color-sub-tab-hover: rgba(255,255,255,0.7);
    --color-sub-tab-active: rgba(255,255,255,0.92);
    --color-avatar-border: white;
  }

  html, body {
    height: 100%;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
  }

  /* ── Window chrome ─────────────────────────────────────────── */
  .window {
    width: min(1024px, 96vw);
    height: min(675px, 92vh);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0px 8px 40px 0px rgba(0,0,0,0.25), 0px 0px 3px 0px rgba(0,0,0,0.55);
    position: relative;
  }

  /* ── Tabstrip ──────────────────────────────────────────────── */
  .tabstrip {
    flex-shrink: 0;
    height: 38px;
    background: var(--tabstrip-bg);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-bottom: 0.5px solid var(--color-border);
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: stretch;
    gap: 1px;
    position: relative;
    z-index: 1;
  }

  .window-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .traffic-light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .traffic-light.close    { background: #ff5f57; }
  .traffic-light.minimize { background: #febc2e; }
  .traffic-light.zoom     { background: #28c840; }

  .home-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 0.5px solid var(--color-border);
    border-right: 0.5px solid var(--color-border);
    flex-shrink: 0;
    color: var(--color-text-secondary);
  }

  .home-btn svg { width: 16px; height: 16px; opacity: 0.5; }

  .tabs-list {
    display: flex;
    align-items: stretch;
    flex: 1;
    overflow: hidden;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 38px 7px 8px;
    min-width: 77px;
    max-width: 200px;
    flex-shrink: 0;
    position: relative;
    border-right: 0.5px solid var(--color-border);
    cursor: default;
    user-select: none;
    transition: background 0.1s;
  }

  .tab.active {
    background: var(--color-bg);
  }

  .tab:not(.active):hover {
    background: var(--color-hover);
  }

  .tab-icon {
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
  }

  .tab-name {
    font-size: 11px;
    font-weight: 550;
    line-height: 16px;
    letter-spacing: 0.055px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab.active .tab-name { color: var(--color-text); }
  .tab:not(.active) .tab-name { color: var(--color-text-secondary); }

  .tab-close {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.1s;
    color: var(--color-text-secondary);
    font-size: 10px;
  }

  .tab:hover .tab-close,
  .tab.active .tab-close { opacity: 1; }

  .tab-add {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--color-text-secondary);
    font-size: 18px;
    cursor: default;
  }

  /* ── Group-Tab ─────────────────────────────────────────────── */
  .group-tab {
    display: flex;
    align-items: center;
    height: 38px;
    flex-shrink: 0;
    background: rgba(204,74,85,0.12);
    border-right: 0.5px solid var(--color-border);
    padding: 0 4px;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }

  .group-tab.expanded { gap: 4px; }

  .group-label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text-secondary);
    letter-spacing: 0.055px;
    white-space: nowrap;
    padding: 3px 4px;
    flex-shrink: 0;
    cursor: default;
  }

  .group-chevron {
    color: var(--color-text-secondary);
    flex-shrink: 0;
    transition: transform 200ms cubic-bezier(0.4,0,0.2,1);
  }
  .group-tab.expanded .group-chevron { transform: rotate(180deg); }

  .group-subtabs {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .sub-tab {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
    padding: 0 5px;
    border-radius: 5px;
    background: var(--color-sub-tab);
    cursor: default;
    max-width: 110px;
    transition: background 0.1s;
  }

  .sub-tab:hover { background: var(--color-hover); }
  .sub-tab.active { background: var(--color-bg); }

  /* Sub-tab "chip" style variant */
  html[data-subtab="chip"] .sub-tab:hover { background: var(--color-sub-tab-hover); }
  html[data-subtab="chip"] .sub-tab.active { background: var(--color-sub-tab-active); }

  /* Chevron visibility toggle */
  html[data-chevron="hidden"] .group-chevron { display: none; }

  .sub-tab-icon { font-size: 11px; line-height: 1; flex-shrink: 0; }

  .sub-tab-name {
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text-secondary);
    letter-spacing: 0.055px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60px;
  }

  .sub-tab.active .sub-tab-name { color: var(--color-text); }

  .sub-tab-close {
    font-size: 9px;
    color: var(--color-text-secondary);
    opacity: 0;
    flex-shrink: 0;
    line-height: 1;
    transition: opacity 0.1s;
    margin-left: 1px;
  }

  .sub-tab:hover .sub-tab-close,
  .sub-tab.active .sub-tab-close { opacity: 0.6; }


  .tab-overview-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-left: 0.5px solid var(--color-border);
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: background 0.1s, color 0.1s;
  }

  .tab-overview-btn:hover { background: var(--color-hover); }
  .tab-overview-btn.active { color: var(--color-text); background: var(--color-hover); }

  .tab-overview-btn svg { width: 14px; height: 14px; }

  /* ── App body ──────────────────────────────────────────────── */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: var(--canvas-bg);
  }

  /* ── Sidebar ───────────────────────────────────────────────── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--color-bg);
    border-right: 0.5px solid var(--color-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px 8px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .sidebar-project {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text);
    line-height: 22px;
    letter-spacing: -0.25px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sidebar-branch {
    font-size: 11px;
    font-weight: 450;
    color: var(--color-text-secondary);
    line-height: 16px;
  }

  .sidebar-tabs {
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
    height: 40px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .sidebar-tab {
    font-size: 11px;
    font-weight: 550;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: default;
  }

  .sidebar-tab.active { background: var(--color-hover); color: var(--color-text); }
  .sidebar-tab:not(.active) { color: var(--color-text-secondary); }

  .sidebar-section-header {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text);
    letter-spacing: 0.055px;
  }

  .sidebar-pages {
    display: flex;
    flex-direction: column;
    padding: 0 0 8px;
  }

  .sidebar-page {
    height: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 450;
    cursor: default;
  }

  .sidebar-page.active {
    background: var(--color-page-active);
    font-weight: 550;
  }

  .sidebar-page-icon { font-size: 12px; }

  /* ── Canvas ────────────────────────────────────────────────── */
  .canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--canvas-bg);
    color: var(--color-text-secondary);
    font-size: 11px;
    font-weight: 450;
  }

  .canvas-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.5;
  }

  .canvas-tab-icon { font-size: 32px; }
  .canvas-tab-name { font-size: 13px; font-weight: 500; color: var(--color-text); }
  .canvas-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }

  /* ── Tab switcher overlay ──────────────────────────────────── */
  .switcher-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  .switcher-overlay.visible {
    pointer-events: auto;
  }

  .switcher-panel {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: 13px;
    box-shadow: 0px 8px 40px rgba(0,0,0,0.18), 0px 0px 3px rgba(0,0,0,0.12);
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.97);
    transition: opacity 80ms ease, transform 80ms ease;
  }

  .switcher-overlay.visible .switcher-panel {
    opacity: 1;
    transform: scale(1);
  }

  .switcher-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 10px;
    justify-content: start;
  }

  /* ── Tab card ─────────────────────────────────────────────── */
  .tab-card {
    width: 150px;
    background: var(--color-bg);
    border: 0.5px solid var(--color-card-border);
    border-radius: 10px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: default;
    user-select: none;
    flex-shrink: 0;
  }

  .tab-card.selected {
    outline: 2px solid var(--color-card-selected);
    outline-offset: 1px;
  }

  .tab-card-thumb {
    width: 100%;
    height: 85px;
    border: 0.5px solid var(--color-border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .tab-card-info {
    padding: 0 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    min-height: 20px;
  }

  .tab-card-title {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    flex: 1;
  }

  .tab-type-icon {
    font-size: 11px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
  }

  .tab-card-name {
    font-size: 11px;
    font-weight: 450;
    line-height: 16px;
    letter-spacing: 0.055px;
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Avatars ───────────────────────────────────────────────── */
  .tab-avatars {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--color-avatar-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
  }

  .avatar + .avatar { margin-left: -5px; }

  /* ── Drag & drop ─────────────────────────────────────────── */
  .drop-into-group {
    outline: 1.5px solid rgba(0,122,255,0.55) !important;
    outline-offset: -1px;
    background: rgba(0,122,255,0.07) !important;
  }

  /* ── Dark mode ─────────────────────────────────────────────── */
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #2c2c2c;
      --color-text: rgba(255,255,255,0.9);
      --color-text-secondary: rgba(255,255,255,0.5);
      --color-border: rgba(255,255,255,0.1);
      --color-hover: rgba(255,255,255,0.06);
      --canvas-bg: #1e1e1e;
      --tabstrip-bg: rgba(44,44,44,0.9);
      --color-ring: rgba(255,255,255,0.3);
      --color-card-border: rgba(255,255,255,0.08);
      --color-card-selected: rgba(255,255,255,0.6);
      --color-page-active: rgba(255,255,255,0.06);
      --color-sub-tab: rgba(255,255,255,0.08);
      --color-sub-tab-hover: rgba(255,255,255,0.14);
      --color-sub-tab-active: rgba(255,255,255,0.2);
      --color-avatar-border: #2c2c2c;
      --color-group-close-hover: rgba(255,255,255,0.06);
    }
    .switcher-panel {
      box-shadow: 0px 8px 40px rgba(0,0,0,0.55), 0px 0px 3px rgba(0,0,0,0.45);
    }
  }

  html[data-theme="dark"] {
    --color-bg: #2c2c2c;
    --color-text: rgba(255,255,255,0.9);
    --color-text-secondary: rgba(255,255,255,0.5);
    --color-border: rgba(255,255,255,0.1);
    --color-hover: rgba(255,255,255,0.06);
    --canvas-bg: #1e1e1e;
    --tabstrip-bg: rgba(44,44,44,0.9);
    --color-ring: rgba(255,255,255,0.3);
    --color-card-border: rgba(255,255,255,0.08);
    --color-card-selected: rgba(255,255,255,0.6);
    --color-page-active: rgba(255,255,255,0.06);
    --color-sub-tab: rgba(255,255,255,0.08);
    --color-sub-tab-hover: rgba(255,255,255,0.14);
    --color-sub-tab-active: rgba(255,255,255,0.2);
    --color-avatar-border: #2c2c2c;
  }
  html[data-theme="dark"] .switcher-panel {
    box-shadow: 0px 8px 40px rgba(0,0,0,0.55), 0px 0px 3px rgba(0,0,0,0.45);
  }

  html[data-theme="light"] {
    --color-bg: white;
    --color-text: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.5);
    --color-border: rgba(0,0,0,0.1);
    --color-hover: rgba(0,0,0,0.05);
    --canvas-bg: #f5f5f5;
    --tabstrip-bg: rgba(255,255,255,0.64);
    --color-ring: rgba(0,0,0,0.3);
    --color-card-border: rgba(0,0,0,0.09);
    --color-card-selected: rgba(0,0,0,0.5);
    --color-page-active: rgba(0,0,0,0.06);
    --color-sub-tab: rgba(255,255,255,0.45);
    --color-sub-tab-hover: rgba(255,255,255,0.7);
    --color-sub-tab-active: rgba(255,255,255,0.92);
    --color-avatar-border: white;
  }

  /* ── Controls ─────────────────────────────────────────────── */
  .proto-control {
    position: fixed;
    right: 20px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: var(--font);
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 999;
    transition: background 0.15s;
  }
  .proto-control:hover { background: rgba(0,0,0,0.5); }

  #chevronToggle { bottom: 100px; }
  #subtabStyleToggle { bottom: 60px; }

  #themeToggle { bottom: 20px; }

</style>
</head>
<body>

<div class="window" id="window">

  <!-- Tabstrip -->
  <div class="tabstrip" id="tabstrip">
    <div class="window-controls">
      <div class="traffic-light close"></div>
      <div class="traffic-light minimize"></div>
      <div class="traffic-light zoom"></div>
    </div>
    <div class="home-btn">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 2L14 7.5V14H10V10H6V14H2V7.5L8 2Z" fill="currentColor"/>
      </svg>
    </div>
    <div class="tabs-list" id="tabsList"></div>
    <div class="tab-add">+</div>
    <div class="tab-overview-btn" id="overviewBtn" title="Tab overview (`)">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="4" height="4" rx="1" fill="currentColor"/>
        <rect x="9" y="1" width="4" height="4" rx="1" fill="currentColor"/>
        <rect x="1" y="9" width="4" height="4" rx="1" fill="currentColor"/>
        <rect x="9" y="9" width="4" height="4" rx="1" fill="currentColor"/>
      </svg>
    </div>
  </div>

  <!-- App body -->
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-project">UI3 Library 2023 (WIP) <span style="opacity:0.4">›</span></div>
        <div class="sidebar-branch">feat-ui3</div>
      </div>
      <div class="sidebar-tabs">
        <div class="sidebar-tab active">File</div>
        <div class="sidebar-tab">Assets</div>
      </div>
      <div class="sidebar-section-header">Pages</div>
      <div class="sidebar-pages">
        <div class="sidebar-page active"><span class="sidebar-page-icon">📍</span>Overview</div>
        <div class="sidebar-page"><span class="sidebar-page-icon">✏️</span>Typography</div>
        <div class="sidebar-page"><span class="sidebar-page-icon">✏️</span>Design Crit Feedback</div>
        <div class="sidebar-page"><span class="sidebar-page-icon">📦</span>Archive</div>
      </div>
    </div>

    <div class="canvas" id="canvas">
      <div class="canvas-label">
        <div class="canvas-tab-icon" id="canvasIcon"></div>
        <div class="canvas-tab-name" id="canvasName"></div>
        <div class="canvas-hint">Hold ` or click ⊞ in the toolbar</div>
      </div>
    </div>
  </div>

  <!-- Tab switcher overlay -->
  <div class="switcher-overlay" id="switcherOverlay">
    <div class="switcher-panel" id="switcherPanel">
      <div class="switcher-grid" id="switcherGrid"></div>
    </div>
  </div>

  <!-- Hint toast -->
  <div class="hint-bar" id="hintBar"></div>

</div>

<button id="chevronToggle" class="proto-control"></button>
<button id="subtabStyleToggle" class="proto-control"></button>
<button id="themeToggle" class="proto-control"></button>

<script>
  const now = Date.now();
  const m = 60 * 1000, h = 3600 * 1000, d = 86400 * 1000, w = 7 * d;

  const TABS = [
    { id: 0,  name: "Design",          icon: "✏️",  bg: "#EAF3FC", collaborators: [{initials:"MK", color:"#E07B6A"}, {initials:"RP", color:"#6A8BE0"}] },
    { id: 1,  name: "FigJam",          icon: "🟪",  bg: "#F0E8FC", deactivated: true },
    { id: 2,  name: "Prototype",       icon: "▶️",  bg: "#E8FAF0", collaborators: [{initials:"SL", color:"#6AC47B"}] },
    { id: 3,  name: "Slide deck",      icon: "🖼️", bg: "#FDF4E3", groupId: "work" },
    { id: 4,  name: "Jam jam",         icon: "🥳",  bg: "#FCE8E8", groupId: "work", collaborators: [{initials:"AJ", color:"#E0A96A"}, {initials:"TN", color:"#9B6AE0"}, {initials:"CW", color:"#6ABDE0"}] },
    { id: 5,  name: "UI3 Library",     icon: "📐",  bg: "#E8EBFC", deactivated: true },
    { id: 6,  name: "Icons",           icon: "⬡",   bg: "#EEFCE8" },
    { id: 7,  name: "Typography",      icon: "T",   bg: "#FCE8F4", collaborators: [{initials:"MK", color:"#E07B6A"}] },
    { id: 8,  name: "Design Tokens",   icon: "🎨",  bg: "#E8FBFC" },
    { id: 9,  name: "Archive",         icon: "📦",  bg: "#F2F2F2", deactivated: true },
    { id: 10, name: "Components",      icon: "🧩",  bg: "#FFF0E8", collaborators: [{initials:"RP", color:"#6A8BE0"}, {initials:"SL", color:"#6AC47B"}] },
    { id: 11, name: "Brand Kit",       icon: "🎯",  bg: "#E8F0FD", deactivated: true },
    { id: 12, name: "Wireframes",      icon: "⬜",  bg: "#F8F8F8" },
    { id: 13, name: "User Research",   icon: "🔍",  bg: "#FDEEE8", deactivated: true },
    { id: 14, name: "Motion",          icon: "🎬",  bg: "#E8F8FD", collaborators: [{initials:"AJ", color:"#E0A96A"}] },
    { id: 15, name: "Dev Handoff",     icon: "📋",  bg: "#F0FDE8" },
  ];

  const CARD_W = 150, CARD_H = 113, GAP = 10, PANEL_PADDING = 12, PEEK = 72;

  const GROUPS = {
    work: { name: 'Work', expanded: false, lastActive: null }
  };
  // Initialize lastActive for each group to its first tab
  for (const [gid, grp] of Object.entries(GROUPS)) {
    const first = TABS.find(t => t.groupId === gid);
    if (first) grp.lastActive = first;
  }

  let activeTabIndex  = 2;   // "Prototype" starts active
  let hoveredIndex    = activeTabIndex;
  let switcherOpen    = false;
  let backtickHeld    = false;  // true while ` is physically held down

  function timeAgo(date) {
    const s = (Date.now() - date) / 1000;
    if (s < 60)        return "Edited just now";
    if (s < 3600)      return `Edited ${Math.floor(s/60)}m ago`;
    if (s < 86400)     return `Edited ${Math.floor(s/3600)}h ago`;
    if (s < 86400*2)   return "Edited yesterday";
    if (s < 86400*7)   return `Edited ${Math.floor(s/86400)}d ago`;
    return `Edited ${Math.floor(s/604800)}w ago`;
  }

  // Returns HTML for a tab icon, with dashed ring if deactivated
  function iconHtml(tab, emojiPx, ringPx) {
    if (!tab.deactivated) {
      return `<span style="font-size:${emojiPx}px;line-height:1">${tab.icon}</span>`;
    }
    const r = ringPx / 2 - 1.5;
    return `<span style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:${ringPx}px;height:${ringPx}px;flex-shrink:0;color:var(--color-ring)">
      <svg width="${ringPx}" height="${ringPx}" viewBox="0 0 ${ringPx} ${ringPx}" style="position:absolute;top:0;left:0" fill="none">
        <circle cx="${ringPx/2}" cy="${ringPx/2}" r="${r}" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2.5 2.2" stroke-linecap="round"/>
      </svg>
      <span style="font-size:${emojiPx * 0.72}px;opacity:0.38;line-height:1">${tab.icon}</span>
    </span>`;
  }

  function getColCount() {
    const panelW = Math.min(window.innerWidth * 0.8, 900) - PANEL_PADDING * 2;
    return Math.max(2, Math.floor((panelW + GAP) / (CARD_W + GAP)));
  }

  // ── Render tabstrip ────────────────────────────────────────
  function renderTabstrip() {
    // Keep lastActive up-to-date for any group whose tab is currently active
    const currentTab = TABS[activeTabIndex];
    if (currentTab && currentTab.groupId && GROUPS[currentTab.groupId]) {
      GROUPS[currentTab.groupId].lastActive = currentTab;
    }

    const list = document.getElementById('tabsList');
    list.innerHTML = '';
    const renderedGroups = new Set();

    TABS.forEach((tab, i) => {
      if (tab.groupId) {
        if (renderedGroups.has(tab.groupId)) return;
        renderedGroups.add(tab.groupId);

        const group = GROUPS[tab.groupId];
        const groupTabs = TABS.filter(t => t.groupId === tab.groupId);
        const el = document.createElement('div');
        el.className = 'group-tab' + (group.expanded ? ' expanded' : '');
        el.dataset.dragGroup = tab.groupId;

        if (!group.expanded) {
          const activeGroupTab = groupTabs.find(t => TABS.indexOf(t) === activeTabIndex);
          const displayTab = activeGroupTab || group.lastActive;
          const displayIdx = displayTab ? TABS.indexOf(displayTab) : -1;
          const isCurrentlyActive = displayTab && displayTab === activeGroupTab;

          const activeChipHtml = displayTab ? `
            <div class="sub-tab${isCurrentlyActive ? ' active' : ''}" data-id="${displayIdx}">
              <span class="sub-tab-icon">${iconHtml(displayTab, 11, 16)}</span>
              <span class="sub-tab-name">${displayTab.name}</span>
              <span class="sub-tab-close">✕</span>
            </div>` : '';

          el.innerHTML = `<span class="group-label">${group.name}<svg class="group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>${activeChipHtml}`;

          el.addEventListener('click', (e) => {
            if (e.target.closest('.sub-tab')) return;
            expandGroup(tab.groupId, el);
          });

          if (displayTab) {
            const subEl = el.querySelector('.sub-tab');
            subEl.addEventListener('mousedown', e => e.stopPropagation());
            subEl.addEventListener('click', (e) => {
              if (e.target.classList.contains('sub-tab-close')) return;
              e.stopPropagation();
              activeTabIndex = displayIdx;
              renderAll();
            });
            subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
              e.stopPropagation();
              TABS[displayIdx].groupId = null;
              if (!TABS.some(t => t.groupId === tab.groupId)) delete GROUPS[tab.groupId];
              renderTabstrip();
            });
            attachDragHandlers(subEl, 'subtab', displayIdx, tab.groupId);
          }
        } else {
          const subTabsHtml = groupTabs.map(t => {
            const tabIdx = TABS.indexOf(t);
            const isActive = tabIdx === activeTabIndex;
            return `<div class="sub-tab${isActive ? ' active' : ''}" data-id="${tabIdx}">
              <span class="sub-tab-icon">${iconHtml(t, 11, 16)}</span>
              <span class="sub-tab-name">${t.name}</span>
              <span class="sub-tab-close">✕</span>
            </div>`;
          }).join('');

          el.innerHTML = `
            <span class="group-label">${group.name}<svg class="group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <div class="group-subtabs">${subTabsHtml}</div>
          `;

          el.querySelector('.group-label').addEventListener('click', (e) => {
            e.stopPropagation();
            collapseGroup(tab.groupId, el);
          });

          el.querySelectorAll('.sub-tab').forEach(subEl => {
            const idx = parseInt(subEl.dataset.id);
            subEl.addEventListener('mousedown', (e) => e.stopPropagation());
            attachDragHandlers(subEl, 'subtab', idx, tab.groupId);
            subEl.addEventListener('click', (e) => {
              if (e.target.classList.contains('sub-tab-close')) return;
              activeTabIndex = idx;
              renderAll();
            });
            subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
              e.stopPropagation();
              TABS[idx].groupId = null;
              const remaining = TABS.filter(t => t.groupId === tab.groupId);
              if (remaining.length === 0) group.expanded = false;
              renderTabstrip();
            });
          });
        }

        attachDragHandlers(el, 'group', null, tab.groupId);
        list.appendChild(el);
        return;
      }

      const el = document.createElement('div');
      el.className = 'tab' + (i === activeTabIndex ? ' active' : '');
      el.dataset.dragIdx = i;
      el.innerHTML = `
        <span class="tab-icon">${iconHtml(tab, 13, 26)}</span>
        <span class="tab-name">${tab.name}</span>
        <span class="tab-close">✕</span>
      `;
      el.addEventListener('click', () => { activeTabIndex = i; renderAll(); });
      attachDragHandlers(el, 'tab', i, null);
      list.appendChild(el);
    });
  }

  // ── Render canvas ──────────────────────────────────────────
  function renderCanvas() {
    const tab = TABS[activeTabIndex];
    document.getElementById('canvasIcon').textContent = tab.icon;
    document.getElementById('canvasName').textContent = tab.name;
  }

  // ── Render switcher grid ────────────────────────────────────
  function renderSwitcher() {
    const cols = getColCount();
    const rows = Math.ceil(TABS.length / cols);
    const contentH = PANEL_PADDING * 2 + rows * CARD_H + (rows - 1) * GAP;
    const maxH = rows <= 2 ? contentH : PANEL_PADDING * 2 + CARD_H * 2 + GAP + PEEK;
    const panel = document.getElementById('switcherPanel');
    panel.style.maxHeight = maxH + 'px';
    panel.style.width = (cols * CARD_W + (cols - 1) * GAP + PANEL_PADDING * 2) + 'px';

    const grid = document.getElementById('switcherGrid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${cols}, ${CARD_W}px)`;

    TABS.forEach((tab, i) => {
      const card = document.createElement('div');
      card.className = 'tab-card' + (i === hoveredIndex ? ' selected' : '');
      card.id = `card-${i}`;

      const avatarsHtml = (tab.collaborators || []).map(a =>
        `<div class="avatar" style="background:${a.color}">${a.initials}</div>`
      ).join('');

      card.innerHTML = `
        <div class="tab-card-thumb" style="background:${tab.bg}"></div>
        <div class="tab-card-info">
          <div class="tab-card-title">
            <span class="tab-type-icon">${iconHtml(tab, 11, 20)}</span>
            <span class="tab-card-name">${tab.name}</span>
          </div>
          ${avatarsHtml ? `<div class="tab-avatars">${avatarsHtml}</div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });

    // Instantly snap panel scroll to show selected card
    requestAnimationFrame(() => {
      const panel = document.getElementById('switcherPanel');
      const card  = document.getElementById(`card-${hoveredIndex}`);
      if (!card || !panel) return;
      const cardTop    = card.offsetTop;
      const cardBottom = cardTop + card.offsetHeight;
      if (cardBottom > panel.scrollTop + panel.clientHeight) {
        panel.scrollTop = cardBottom - panel.clientHeight + GAP;
      } else if (cardTop < panel.scrollTop) {
        panel.scrollTop = cardTop - GAP;
      }
    });
  }

  // ── Group expand / collapse animations ─────────────────────
  function measureCollapsedWidth(groupId) {
    const group = GROUPS[groupId];
    const groupTabs = TABS.filter(t => t.groupId === groupId);
    const activeGroupTab = groupTabs.find(t => TABS.indexOf(t) === activeTabIndex);
    const displayTab = activeGroupTab || group.lastActive;

    const tmp = document.createElement('div');
    tmp.className = 'group-tab';
    tmp.style.cssText = 'visibility:hidden;position:absolute;top:0;pointer-events:none;';

    let chipHtml = '';
    if (displayTab) {
      const idx = TABS.indexOf(displayTab);
      chipHtml = `<div class="sub-tab${activeGroupTab ? ' active' : ''}" data-id="${idx}">
        <span class="sub-tab-icon">${iconHtml(displayTab, 11, 16)}</span>
        <span class="sub-tab-name">${displayTab.name}</span>
        <span class="sub-tab-close">✕</span>
      </div>`;
    }

    tmp.innerHTML = `<span class="group-label">${group.name}<svg class="group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>${chipHtml}`;
    document.getElementById('tabstrip').appendChild(tmp);
    const w = tmp.offsetWidth;
    tmp.remove();
    return w;
  }

  function expandGroup(groupId, pillEl) {
    const startW = pillEl.offsetWidth;
    GROUPS[groupId].expanded = true;
    // If no sub-tab is currently active, clear lastActive so that collapsing
    // after viewing (but not selecting from) the expanded group shows bare pill.
    const hasActiveSubTab = TABS.some((t, i) => t.groupId === groupId && i === activeTabIndex);
    if (!hasActiveSubTab) GROUPS[groupId].lastActive = null;
    renderTabstrip();
    const el = document.querySelector(`[data-drag-group="${groupId}"]`);
    if (!el) return;

    const endW = el.offsetWidth; // natural expanded width before any constraint

    // Only the subtabs row fades in — group label stays fully visible
    const chips = el.querySelectorAll('.group-subtabs');
    chips.forEach(c => { c.style.opacity = '0'; c.style.transition = 'none'; });

    // Chevron: CSS class instantly sets it to 180deg after re-render.
    // Pin it back to 0deg so the transition has a "from" state to animate from.
    const chevron = el.querySelector('.group-chevron');
    if (chevron) { chevron.style.transform = 'rotate(0deg)'; chevron.style.transition = 'none'; }

    el.style.width = startW + 'px';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'width 200ms cubic-bezier(0.4,0,0.2,1)';
      el.style.width = endW + 'px';

      // Release chevron to CSS class — transition fires from 0deg → 180deg
      if (chevron) { chevron.style.transition = ''; chevron.style.transform = ''; }

      // Chips fade in mid-flight, overlapping with the expansion
      setTimeout(() => {
        chips.forEach(c => {
          c.style.transition = 'opacity 140ms ease';
          c.style.opacity = '1';
        });
      }, 60);

      const onDone = (e) => {
        if (e.propertyName !== 'width') return;
        el.removeEventListener('transitionend', onDone);
        el.style.width = el.style.transition = '';
        chips.forEach(c => { c.style.opacity = c.style.transition = ''; });
      };
      el.addEventListener('transitionend', onDone);
    }));
  }

  function collapseGroup(groupId, el) {
    const startW = el.offsetWidth;
    const endW = measureCollapsedWidth(groupId);

    // Only subtabs fade out — group label stays visible as container shrinks
    const chips = el.querySelectorAll('.group-subtabs');

    el.style.width = startW + 'px';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      // Width shrink, chip fade, and chevron rotation all start simultaneously
      el.style.transition = 'width 190ms cubic-bezier(0.4,0,0.2,1)';
      el.style.width = endW + 'px';

      chips.forEach(c => {
        c.style.transition = 'opacity 110ms ease';
        c.style.opacity = '0';
      });

      // Chevron: override CSS class (180deg) and animate back to 0deg
      const chevron = el.querySelector('.group-chevron');
      if (chevron) {
        chevron.style.transition = 'transform 190ms cubic-bezier(0.4,0,0.2,1)';
        chevron.style.transform = 'rotate(0deg)';
      }

      const onDone = (e) => {
        if (e.propertyName !== 'width') return;
        el.removeEventListener('transitionend', onDone);
        GROUPS[groupId].expanded = false;
        renderTabstrip();
      };
      el.addEventListener('transitionend', onDone);
    }));
  }

  // ── Drag & drop ────────────────────────────────────────────
  let drag = null;
  const dropLine = (() => {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;width:2px;border-radius:2px;background:rgba(0,122,255,0.9);pointer-events:none;z-index:9998;display:none;';
    document.body.appendChild(el);
    return el;
  })();

  function attachDragHandlers(el, kind, tabIdx, groupId) {
    el.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      const sx = e.clientX, sy = e.clientY;
      let started = false;
      const tryStart = (ev) => {
        if (started || Math.hypot(ev.clientX - sx, ev.clientY - sy) < 4) return;
        started = true; cleanup();
        beginDrag(ev, kind, tabIdx, groupId, el);
      };
      const cleanup = () => {
        document.removeEventListener('mousemove', tryStart);
        document.removeEventListener('mouseup', cleanup);
      };
      document.addEventListener('mousemove', tryStart);
      document.addEventListener('mouseup', cleanup);
    });
  }

  function beginDrag(e, kind, tabIdx, groupId, sourceEl) {
    e.preventDefault();
    const r = sourceEl.getBoundingClientRect();
    const ghost = sourceEl.cloneNode(true);
    Object.assign(ghost.style, {
      position:'fixed', pointerEvents:'none', zIndex:'9999',
      width: r.width+'px', height: r.height+'px',
      left: r.left+'px', top: r.top+'px',
      opacity:'0.88', transform:'scale(1.04)',
      boxShadow:'0 4px 20px rgba(0,0,0,0.22)',
      borderRadius:'6px', transition:'none'
    });
    document.body.appendChild(ghost);
    sourceEl.style.opacity = '0.28';
    drag = { kind, tabIdx, groupId, ghost, sourceEl,
      offX: e.clientX - r.left, offY: e.clientY - r.top, dropInfo: null };
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }

  function onDragMove(e) {
    if (!drag) return;
    drag.ghost.style.left = (e.clientX - drag.offX) + 'px';
    drag.ghost.style.top  = (e.clientY - drag.offY) + 'px';
    document.querySelectorAll('.drop-into-group').forEach(el => el.classList.remove('drop-into-group'));
    drag.dropInfo = calcDropInfo(e.clientX, e.clientY);
    if (!drag.dropInfo) { dropLine.style.display = 'none'; return; }
    if (drag.dropInfo.kind === 'into-group') {
      drag.dropInfo.el.classList.add('drop-into-group');
      dropLine.style.display = 'none';
    } else {
      const sr = document.getElementById('tabstrip').getBoundingClientRect();
      Object.assign(dropLine.style, {
        display:'block', left:(drag.dropInfo.x - 1)+'px',
        top:(sr.top + 5)+'px', height:(sr.height - 10)+'px'
      });
    }
  }

  function onDragEnd() {
    if (!drag) return;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    drag.ghost.remove();
    drag.sourceEl.style.opacity = '';
    dropLine.style.display = 'none';
    document.querySelectorAll('.drop-into-group').forEach(el => el.classList.remove('drop-into-group'));
    if (drag.dropInfo) applyDrop(drag.dropInfo);
    drag = null;
    renderTabstrip();
  }

  function calcDropInfo(x, y) {
    const sr = document.getElementById('tabstrip').getBoundingClientRect();
    if (y < sr.top || y > sr.bottom) return null;
    const items = [...document.getElementById('tabsList').querySelectorAll('[data-drag-idx],[data-drag-group]')];
    if (!items.length) return null;
    for (const item of items) {
      const r = item.getBoundingClientRect();
      if (x > r.right) continue;
      if (x < r.left) return { kind:'before', el:item, x:r.left };
      // Over this item — middle zone on a group = drop into
      const isGroup = item.hasAttribute('data-drag-group');
      const gId = item.dataset.dragGroup;
      const canInto = isGroup && drag.kind !== 'group' &&
        !(drag.kind === 'subtab' && drag.groupId === gId);
      if (canInto && x > r.left + r.width * 0.2 && x < r.right - r.width * 0.2)
        return { kind:'into-group', el:item, groupId:gId };
      return x < r.left + r.width / 2
        ? { kind:'before', el:item, x:r.left }
        : { kind:'after',  el:item, x:r.right };
    }
    const last = items[items.length - 1];
    return { kind:'after', el:last, x:last.getBoundingClientRect().right };
  }

  function applyDrop(info) {
    const activeTab = TABS[activeTabIndex]; // track by reference through mutations

    // ── Drop into group ────────────────────────────────────
    if (info.kind === 'into-group') {
      const tab = TABS[drag.tabIdx];
      const oldGroup = tab.groupId;
      tab.groupId = info.groupId;
      const memberIdxs = TABS.map((t, i) => (t.groupId === info.groupId && i !== drag.tabIdx) ? i : -1).filter(i => i >= 0);
      if (memberIdxs.length) {
        const insertAfter = Math.max(...memberIdxs);
        const [moved] = TABS.splice(drag.tabIdx, 1);
        const pos = drag.tabIdx <= insertAfter ? insertAfter : insertAfter + 1;
        TABS.splice(Math.min(pos, TABS.length), 0, moved);
      }
      GROUPS[info.groupId].expanded = true;
      if (oldGroup && oldGroup !== info.groupId && !TABS.some(t => t.groupId === oldGroup))
        delete GROUPS[oldGroup];
      activeTabIndex = TABS.indexOf(activeTab);
      return;
    }

    const isAfter = info.kind === 'after';

    function insertPoint(targetEl) {
      if (targetEl.hasAttribute('data-drag-idx')) {
        const idx = parseInt(targetEl.dataset.dragIdx);
        return isAfter ? idx + 1 : idx;
      }
      const gId = targetEl.dataset.dragGroup;
      const gIdxs = TABS.map((t, i) => t.groupId === gId ? i : -1).filter(i => i >= 0);
      return isAfter ? Math.max(...gIdxs) + 1 : Math.min(...gIdxs);
    }

    // ── Move group ─────────────────────────────────────────
    if (drag.kind === 'group') {
      if (info.el.dataset.dragGroup === drag.groupId) return;
      const groupTabs = TABS.filter(t => t.groupId === drag.groupId);
      const curIdxs  = TABS.map((t, i) => t.groupId === drag.groupId ? i : -1).filter(i => i >= 0);
      let at = insertPoint(info.el);
      const before = curIdxs.filter(i => i < at).length;
      for (let i = TABS.length - 1; i >= 0; i--)
        if (TABS[i].groupId === drag.groupId) TABS.splice(i, 1);
      at = Math.max(0, Math.min(at - before, TABS.length));
      TABS.splice(at, 0, ...groupTabs);

    // ── Move tab or sub-tab (drops standalone) ─────────────
    } else {
      const tab = TABS[drag.tabIdx];
      const oldGroup = tab.groupId;
      // If dropping onto same group item, don't ungroup — just bail
      if (info.el.dataset.dragGroup === tab.groupId) return;
      let at = insertPoint(info.el);
      TABS.splice(drag.tabIdx, 1);
      tab.groupId = null;
      if (drag.tabIdx < at) at--;
      at = Math.max(0, Math.min(at, TABS.length));
      TABS.splice(at, 0, tab);
      if (oldGroup && !TABS.some(t => t.groupId === oldGroup)) delete GROUPS[oldGroup];
    }

    activeTabIndex = TABS.indexOf(activeTab);
  }

  function renderAll() {
    renderTabstrip();
    renderCanvas();
  }

  // ── Switcher open/close ────────────────────────────────────
  function openSwitcher() {
    if (!switcherOpen) {
      switcherOpen = true;
      renderSwitcher();
      document.getElementById('switcherOverlay').classList.add('visible');
      document.getElementById('overviewBtn').classList.add('active');
    }
  }

  function closeSwitcher(commit) {
    if (!switcherOpen) return;
    switcherOpen = false;
    if (commit) activeTabIndex = hoveredIndex;
    else hoveredIndex = activeTabIndex;
    document.getElementById('switcherOverlay').classList.remove('visible');
    document.getElementById('overviewBtn').classList.remove('active');
    renderAll();
  }

  // ── Keyboard ───────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    // Backtick — hold to keep open, release to commit (mirrors macOS App Switcher)
    if (e.key === '`' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      if (!e.repeat && !backtickHeld) {
        backtickHeld = true;
        hoveredIndex = activeTabIndex;
        openSwitcher();
      }
      return;
    }

    if (!switcherOpen) return;

    const cols = getColCount();

    if (e.key === 'ArrowRight') {
      e.preventDefault();
      hoveredIndex = (hoveredIndex + 1) % TABS.length;
      renderSwitcher();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      hoveredIndex = (hoveredIndex - 1 + TABS.length) % TABS.length;
      renderSwitcher();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      hoveredIndex = Math.min(hoveredIndex + cols, TABS.length - 1);
      renderSwitcher();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      hoveredIndex = Math.max(hoveredIndex - cols, 0);
      renderSwitcher();
    } else if (e.key === 'Escape') {
      backtickHeld = false;
      closeSwitcher(false);
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.key === '`' && backtickHeld) {
      backtickHeld = false;
      closeSwitcher(true);
    }
  });

  // Click button = toggle (no hold concept for mouse)
  document.getElementById('overviewBtn').addEventListener('click', () => {
    if (switcherOpen) { closeSwitcher(true); } else { hoveredIndex = activeTabIndex; openSwitcher(); }
  });

  window.addEventListener('resize', () => {
    if (switcherOpen) renderSwitcher();
  });

  // ── Chevron toggle ─────────────────────────────────────────
  const chevronToggle = document.getElementById('chevronToggle');
  function isChevronHidden() { return document.documentElement.dataset.chevron === 'hidden'; }
  function syncChevronToggle() {
    chevronToggle.textContent = isChevronHidden() ? '› Show chevron' : '› Hide chevron';
  }
  chevronToggle.addEventListener('click', () => {
    document.documentElement.dataset.chevron = isChevronHidden() ? '' : 'hidden';
    syncChevronToggle();
  });
  syncChevronToggle();

  // ── Sub-tab style toggle ───────────────────────────────────
  const subtabToggle = document.getElementById('subtabStyleToggle');
  function isChipStyle() { return document.documentElement.dataset.subtab === 'chip'; }
  function syncSubtabToggle() {
    subtabToggle.textContent = isChipStyle() ? '⬡ Match tabs' : '⬡ Chip style';
  }
  subtabToggle.addEventListener('click', () => {
    document.documentElement.dataset.subtab = isChipStyle() ? '' : 'chip';
    syncSubtabToggle();
  });
  syncSubtabToggle();

  // ── Theme toggle ───────────────────────────────────────────
  const themeToggle = document.getElementById('themeToggle');
  function isDark() {
    const t = document.documentElement.dataset.theme;
    return t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  function syncToggle() {
    themeToggle.textContent = isDark() ? '☀️ Light' : '🌙 Dark';
  }
  themeToggle.addEventListener('click', () => {
    document.documentElement.dataset.theme = isDark() ? 'light' : 'dark';
    syncToggle();
  });
  syncToggle();

  // ── Init ───────────────────────────────────────────────────
  renderAll();
</script>
</body>
</html>
