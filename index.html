<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Som — Tab Switcher Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: white;
    --color-text: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.5);
    --color-text-tertiary: rgba(0,0,0,0.3);
    --color-border: rgba(0,0,0,0.1);
    --color-hover: rgba(0,0,0,0.05);
    --canvas-bg: #f5f5f5;
    --tabstrip-bg: rgba(255,255,255,0.64);
    --font: 'Inter', sans-serif;
    --color-ring: rgba(0,0,0,0.3);
    --color-card-border: rgba(0,0,0,0.09);
    --color-card-selected: rgba(0,0,0,0.5);
    --color-page-active: rgba(0,0,0,0.06);
    --color-sub-tab: rgba(0,0,0,0.1);
    --color-sub-tab-hover: rgba(0,0,0,0.145);
    --color-sub-tab-active: rgba(0,0,0,0.08);
    --color-avatar-border: white;
    --color-group: #daecdf;
  }

  html, body {
    height: 100%;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
  }

  /* ── Window chrome ─────────────────────────────────────────── */
  .window {
    width: min(1024px, 96vw);
    height: min(675px, 92vh);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0px 8px 40px 0px rgba(0,0,0,0.25), 0px 0px 3px 0px rgba(0,0,0,0.55);
    position: relative;
  }

  /* ── Tabstrip ──────────────────────────────────────────────── */
  .tabstrip {
    flex-shrink: 0;
    height: 38px;
    background: var(--tabstrip-bg);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-bottom: 0.5px solid var(--color-border);
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: stretch;
    gap: 1px;
    position: relative;
    z-index: 1;
  }

  .window-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .traffic-light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .traffic-light.close    { background: #ff5f57; }
  .traffic-light.minimize { background: #febc2e; }
  .traffic-light.zoom     { background: #28c840; }

  .home-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 0.5px solid var(--color-border);
    border-right: 0.5px solid var(--color-border);
    flex-shrink: 0;
    color: var(--color-text-secondary);
  }

  .home-btn svg { width: 16px; height: 16px; opacity: 0.5; }

  .tabs-list {
    display: flex;
    align-items: stretch;
    flex: 1;
    overflow: hidden;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 7px 8px 7px 8px;
    min-width: 38px;
    max-width: 200px;
    flex: 1 1 0;
    position: relative;
    border-right: 0.5px solid var(--color-border);
    cursor: default;
    user-select: none;
    transition: background 0.1s;
    container-type: inline-size;
  }

  .tab.active {
    background: var(--color-bg);
  }

  .tab:not(.active):hover {
    background: var(--color-hover);
  }

  .tab-icon {
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
    overflow: hidden;
    max-width: 20px;
    margin-right: 6px;
    opacity: 1;
    transition: max-width 0.18s ease, margin-right 0.18s ease, opacity 0.12s ease;
  }

  .tab-name {
    font-size: 11px;
    font-weight: 550;
    line-height: 16px;
    letter-spacing: 0.055px;
    white-space: nowrap;
    overflow: hidden;
    flex: 1;
    -webkit-mask-image: linear-gradient(to right, black calc(100% - 8px), transparent 100%);
    mask-image: linear-gradient(to right, black calc(100% - 8px), transparent 100%);
  }

  @container (min-width: 60px) {
    .tab:hover .tab-name,
    .tab.active .tab-name {
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
      mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
    }
  }

  .tab.active .tab-name { color: var(--color-text); }
  .tab:not(.active) .tab-name { color: var(--color-text-secondary); }
  .tab.deactivated .tab-name { color: var(--color-text-tertiary); }
  .tab.deactivated:hover .tab-name,
  .tab.deactivated.active .tab-name { color: var(--color-text-secondary); }

  .tab-icon-wrap {
    position: relative;
    display: inline-flex;
    flex-shrink: 0;
  }
  .tab-icon-default { transition: opacity 0.1s; filter: grayscale(100%) brightness(0); opacity: 0.45; }
  /* White-mono icons (e.g. Make): white by nature, no inversion needed in dark mode */
  @media (prefers-color-scheme: dark) { .tab-icon-mono-white { filter: none; } }
  html[data-theme="dark"] .tab-icon-mono-white { filter: none; }
  .tab-icon-colored {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .tab:hover .tab-icon-colored,
  .tab.active .tab-icon-colored { opacity: 1; }
  .tab:hover .tab-icon-default,
  .tab.active .tab-icon-default { opacity: 0; }
  .tab.deactivated .tab-icon-default { opacity: 0.3; }
  .tab.deactivated:hover .tab-icon-default,
  .tab.deactivated.active .tab-icon-default { opacity: 0; }

  /* ── Context menu ─────────────────────────────────────────── */
  .ctx-menu {
    position: fixed;
    z-index: 9999;
    width: 200px;
    background: #1e1e1e;
    border-radius: 13px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.04),
      0 0 0.5px rgba(0,0,0,0.12),
      0 10px 16px rgba(0,0,0,0.08),
      0 2px 6px rgba(0,0,0,0.12);
    padding: 8px 0;
    user-select: none;
    font-family: var(--font);
  }
  .ctx-item {
    display: flex;
    align-items: center;
    height: 24px;
    padding: 0 8px 0 12px;
    font-size: 11px;
    font-weight: 450;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.055px;
    cursor: default;
    white-space: nowrap;
    gap: 4px;
    border-radius: 5px;
    margin: 0 4px;
  }
  .ctx-item:hover { background: rgba(255,255,255,0.1); }
  .ctx-trail { margin-left: auto; opacity: 0.4; font-size: 10px; letter-spacing: 0; }
  .ctx-arrow { margin-left: auto; opacity: 0.5; }
  .ctx-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 7px 0; }
  .ctx-group-header { padding: 2px 8px 6px; display: flex; flex-direction: column; gap: 6px; }
  .ctx-group-name-input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid #0c8ce9;
    border-radius: 4px;
    color: rgba(255,255,255,0.9);
    font: 450 11px var(--font);
    letter-spacing: 0.055px;
    padding: 3px 6px;
    outline: none;
  }
  .ctx-color-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .ctx-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    cursor: default; flex-shrink: 0;
    position: relative; box-sizing: border-box;
    outline: 1.5px solid transparent;
    outline-offset: 1px;
    transition: outline-color 0.1s, transform 0.1s;
  }
  .ctx-swatch:hover { transform: scale(1.15); }
  .ctx-swatch.selected { outline-color: rgba(255,255,255,0.75); }
  .ctx-swatch.swatch-none { background: transparent; border: 1.5px solid rgba(255,255,255,0.35); }
  .ctx-has-submenu { position: relative; }
  .ctx-submenu { display: none; position: absolute; left: 100%; top: -8px; padding-left: 6px; }
  .ctx-submenu.ctx-submenu-visible { display: block; }

  .tab-close {
    position: absolute;
    right: 7px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  .tab-close:hover { background: var(--color-hover); }

  .tab.active .tab-close { opacity: 1; pointer-events: auto; }

  @container (min-width: 60px) {
    .tab:hover .tab-close { opacity: 1; pointer-events: auto; }
  }

  @container (max-width: 59px) {
    .tab.active .tab-icon {
      max-width: 0;
      margin-right: 0;
      opacity: 0;
    }
    .tab.active .tab-name {
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 42px), transparent calc(100% - 26px));
      mask-image: linear-gradient(to right, black calc(100% - 42px), transparent calc(100% - 26px));
    }
  }

  .tab-add {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--color-text-secondary);
    font-size: 18px;
    cursor: default;
  }

  /* ── Group-Tab ─────────────────────────────────────────────── */
  .group-tab {
    display: flex;
    align-items: center;
    height: 38px;
    flex-shrink: 0;
    background: transparent;
    border-right: 0.5px solid var(--color-border);
    padding: 0 8px;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }

  .group-tab:not(.expanded):hover { background: var(--color-hover); }
  .group-tab:not(.expanded):has(.sub-tab.active) { background: transparent; }
  .group-tab:not(.expanded):hover:has(.sub-tab.active) { background: var(--color-hover); }
  .group-tab:not(.expanded):has(.sub-tab) { gap: 8px; }
  .group-tab.expanded { gap: 4px; background: var(--color-group); flex-shrink: 1; min-width: 0; }

  .group-label {
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text-secondary);
    letter-spacing: 0.055px;
    white-space: nowrap;
    padding: 3px 8px;
    flex-shrink: 0;
    cursor: default;
    background: var(--color-group);
    border-radius: 5px;
    height: 24px;
    box-sizing: border-box;
    transition: color 200ms ease;
  }

  .group-tab.expanded .group-label {
    background: transparent;
    color: var(--color-text);
    height: auto;
    border-radius: 0;
  }

  .group-subtabs {
    display: flex;
    align-items: center;
    gap: 3px;
    min-width: 0;
    flex: 1 1 0;
  }

  .sub-tab {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
    padding: 0 5px;
    border-radius: 5px;
    background: var(--color-sub-tab);
    cursor: default;
    flex: 1 1 0;
    min-width: 0;
    transition: background 0.1s;
    position: relative;
    overflow: hidden;
    container-type: inline-size;
  }

  /* In collapsed group, the pill is a direct child — give it the same effective
     minimum width it had when the close button was a flex child (56px). */
  .group-tab:not(.expanded) > .sub-tab { min-width: 56px; }

  .sub-tab:hover { background: var(--color-sub-tab-hover); }
  .sub-tab.active { background: var(--color-bg); }


  .sub-tab-icon { font-size: 11px; line-height: 1; flex-shrink: 0; max-width: 20px; overflow: hidden; transition: max-width 0.18s ease, opacity 0.12s ease; }

  .sub-tab:hover .tab-icon-colored,
  .sub-tab.active .tab-icon-colored { opacity: 1; }
  .sub-tab:hover .tab-icon-default,
  .sub-tab.active .tab-icon-default { opacity: 0; }

  .sub-tab-name {
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text-secondary);
    letter-spacing: 0.055px;
    white-space: nowrap;
    overflow: hidden;
    flex: 1;
    min-width: 0;
    -webkit-mask-image: linear-gradient(to right, black calc(100% - 8px), transparent 100%);
    mask-image: linear-gradient(to right, black calc(100% - 8px), transparent 100%);
  }

  .sub-tab:hover .sub-tab-name,
  .sub-tab.active .sub-tab-name { color: var(--color-text); }

  .sub-tab-close {
    position: absolute;
    right: 5px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  .sub-tab-close:hover { background: var(--color-hover); }

  .sub-tab.active .sub-tab-close { opacity: 0.6; pointer-events: auto; }

  @container (min-width: 60px) {
    .sub-tab:hover .sub-tab-close { opacity: 0.6; pointer-events: auto; }
    .sub-tab:hover .sub-tab-name,
    .sub-tab.active .sub-tab-name {
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
      mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
    }
  }

  @container (max-width: 59px) {
    .sub-tab.active .sub-tab-icon { max-width: 0; opacity: 0; }
    .sub-tab.active .sub-tab-name {
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
      mask-image: linear-gradient(to right, black calc(100% - 32px), transparent calc(100% - 24px));
    }
  }


  .tab-overview-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-left: 0.5px solid var(--color-border);
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: background 0.1s, color 0.1s;
  }

  .tab-overview-btn:hover { background: var(--color-hover); }
  .tab-overview-btn.active { color: var(--color-text); background: var(--color-hover); }

  .tab-overview-btn svg { width: 14px; height: 14px; }

  /* ── App body ──────────────────────────────────────────────── */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: var(--canvas-bg);
  }

  /* ── Sidebar ───────────────────────────────────────────────── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--color-bg);
    border-right: 0.5px solid var(--color-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px 8px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .sidebar-project {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text);
    line-height: 22px;
    letter-spacing: -0.25px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sidebar-branch {
    font-size: 11px;
    font-weight: 450;
    color: var(--color-text-secondary);
    line-height: 16px;
  }

  .sidebar-tabs {
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
    height: 40px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .sidebar-tab {
    font-size: 11px;
    font-weight: 550;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: default;
  }

  .sidebar-tab.active { background: var(--color-hover); color: var(--color-text); }
  .sidebar-tab:not(.active) { color: var(--color-text-secondary); }

  .sidebar-section-header {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 550;
    color: var(--color-text);
    letter-spacing: 0.055px;
  }

  .sidebar-pages {
    display: flex;
    flex-direction: column;
    padding: 0 0 8px;
  }

  .sidebar-page {
    height: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 450;
    cursor: default;
  }

  .sidebar-page.active {
    background: var(--color-page-active);
    font-weight: 550;
  }

  .sidebar-page-icon { font-size: 12px; }

  /* ── Canvas ────────────────────────────────────────────────── */
  .canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--canvas-bg);
    color: var(--color-text-secondary);
    font-size: 11px;
    font-weight: 450;
  }

  .canvas-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.5;
  }

  .canvas-tab-icon { font-size: 32px; }
  .canvas-tab-name { font-size: 13px; font-weight: 500; color: var(--color-text); }
  .canvas-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }

  /* ── Tab switcher overlay ──────────────────────────────────── */
  .switcher-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  .switcher-overlay.visible {
    pointer-events: auto;
  }

  .switcher-panel {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: 13px;
    box-shadow: 0px 8px 40px rgba(0,0,0,0.18), 0px 0px 3px rgba(0,0,0,0.12);
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.97);
    transition: opacity 80ms ease, transform 80ms ease;
  }

  .switcher-overlay.visible .switcher-panel {
    opacity: 1;
    transform: scale(1);
  }

  .switcher-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 10px;
    justify-content: start;
  }

  /* ── Tab card ─────────────────────────────────────────────── */
  .tab-card {
    width: 150px;
    background: var(--color-bg);
    border: 0.5px solid var(--color-card-border);
    border-radius: 10px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: default;
    user-select: none;
    flex-shrink: 0;
  }

  .tab-card.selected {
    outline: 2px solid var(--color-card-selected);
    outline-offset: 1px;
  }

  .tab-card-thumb {
    width: 100%;
    height: 85px;
    border: 0.5px solid var(--color-border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .tab-card-info {
    padding: 0 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    min-height: 20px;
  }

  .tab-card-title {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    flex: 1;
  }

  .tab-type-icon {
    font-size: 11px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
  }

  .tab-card-name {
    font-size: 11px;
    font-weight: 450;
    line-height: 16px;
    letter-spacing: 0.055px;
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Avatars ───────────────────────────────────────────────── */
  .tab-avatars {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--color-avatar-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
  }

  .avatar + .avatar { margin-left: -5px; }

  /* ── Drag & drop ─────────────────────────────────────────── */
  .drop-into-group {
    outline: 1.5px solid rgba(0,122,255,0.55) !important;
    outline-offset: -1px;
    background: rgba(0,122,255,0.07) !important;
  }

  /* ── Dark mode ─────────────────────────────────────────────── */
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #2c2c2c;
      --color-text: rgba(255,255,255,0.9);
      --color-text-secondary: rgba(255,255,255,0.5);
      --color-text-tertiary: rgba(255,255,255,0.3);
      --color-border: rgba(255,255,255,0.1);
      --color-hover: rgba(255,255,255,0.06);
      --canvas-bg: #1e1e1e;
      --tabstrip-bg: rgba(44,44,44,0.9);
      --color-ring: rgba(255,255,255,0.3);
      --color-card-border: rgba(255,255,255,0.08);
      --color-card-selected: rgba(255,255,255,0.6);
      --color-page-active: rgba(255,255,255,0.06);
      --color-sub-tab: rgba(255,255,255,0.08);
      --color-sub-tab-hover: rgba(255,255,255,0.14);
      --color-sub-tab-active: rgba(255,255,255,0.2);
      --color-avatar-border: #2c2c2c;
      --color-group-close-hover: rgba(255,255,255,0.06);
      --color-group: rgba(218,236,223,0.15);
    }
    .switcher-panel {
      box-shadow: 0px 8px 40px rgba(0,0,0,0.55), 0px 0px 3px rgba(0,0,0,0.45);
    }
  }

  html[data-theme="dark"] {

  html[data-theme="light"] {

    --color-sub-tab-active: rgba(0,0,0,0.08);

  }

  /* ── Settings panel ───────────────────────────────────────── */
  .proto-settings-btn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 36px;
    height: 36px;
    border-radius: 10px;

  .proto-settings-btn.open { background: rgba(0,0,0,0.55); }

  .proto-settings-panel {
    position: fixed;
    right: 20px;

    width: 220px;

  .proto-section { padding: 6px 12px; }
  .proto-section + .proto-section {
    border-top: 1px solid rgba(255,255,255,0.08);

<div class="window" id="window">

<script>
  const now = Date.now();
  const m = 60 * 1000, h = 3600 * 1000, d = 86400 * 1000, w = 7 * d;

  const ICON_PEN    = "https://staging.figma.com/api/mcp/asset/d975fc94-cd32-4d09-988b-2fe070648532";
  const ICON_DESIGN = "https://staging.figma.com/api/mcp/asset/d80fd055-2f22-4b96-bc6f-247aa23fca79";
  const ICON_PLAY   = "https://staging.figma.com/api/mcp/asset/467e4c50-b3a4-4203-974a-aec3fc7f7d34";
  const ICON_SLIDE  = "https://staging.figma.com/api/mcp/asset/97fe7fc7-eda8-45a0-814e-766f7ade9661";
  const ICON_FIGJAM = "https://staging.figma.com/api/mcp/asset/027e290c-ed9a-4fd0-898d-e1694397cb91";
  const ICON_CLOSE  = "https://staging.figma.com/api/mcp/asset/7f58e6fa-bf90-48b9-920f-6d5dc417bda5";
  // Colored (hover/active) icon variants
  const ICON_PEN_COLOR    = "https://staging.figma.com/api/mcp/asset/a2885944-75b3-446c-8c2c-b0bc0f132042";
  const ICON_SLIDE_COLOR  = "https://staging.figma.com/api/mcp/asset/2e563d25-3e63-40dc-9d8a-a644e47da20b";
  const ICON_PLAY_COLOR   = "https://staging.figma.com/api/mcp/asset/10b0bee1-f7b2-4c22-b393-576f83b5029e";
  const ICON_FIGJAM_COLOR = "https://staging.figma.com/api/mcp/asset/d9ea58b7-be57-420a-aa01-895803246571";
  const ICON_MAKE         = "https://staging.figma.com/api/mcp/asset/dfb0d96e-db96-4681-8f90-d554547bcb85";
  const ICON_MAKE_COLOR   = "https://staging.figma.com/api/mcp/asset/77c6dccb-9106-4a7a-85d2-486aba6cedf5";
  const CLOSE_IMG   = `<img src="${ICON_CLOSE}" alt="" style="width:10px;height:10px;display:block;pointer-events:none">`;

  const TABS = [
    { id: 0,  name: "Design",          icon: "✏️",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#EAF3FC", collaborators: [{initials:"MK", color:"#E07B6A"}, {initials:"RP", color:"#6A8BE0"}] },
    { id: 1,  name: "FigJam",          icon: "🟪",  iconUrl: ICON_FIGJAM, colorUrl: ICON_FIGJAM_COLOR, bg: "#F0E8FC", deactivated: true },
    { id: 2,  name: "Prototype",       icon: "▶️",  iconUrl: ICON_MAKE,   colorUrl: ICON_MAKE_COLOR,   bg: "#E8FAF0", monoWhite: true, collaborators: [{initials:"SL", color:"#6AC47B"}] },
    { id: 3,  name: "Slide deck",      icon: "🖼️", iconUrl: ICON_SLIDE,  colorUrl: ICON_SLIDE_COLOR,  bg: "#FDF4E3", groupId: "work" },
    { id: 4,  name: "Jam jam",         icon: "🥳",  iconUrl: ICON_FIGJAM, colorUrl: ICON_FIGJAM_COLOR, bg: "#FCE8E8", groupId: "work", collaborators: [{initials:"AJ", color:"#E0A96A"}, {initials:"TN", color:"#9B6AE0"}, {initials:"CW", color:"#6ABDE0"}] },
    { id: 5,  name: "UI3 Library",     icon: "📐",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#E8EBFC", deactivated: true },
    { id: 6,  name: "Icons",           icon: "⬡",   iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#EEFCE8" },
    { id: 7,  name: "Typography",      icon: "T",    iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#FCE8F4", collaborators: [{initials:"MK", color:"#E07B6A"}] },
    { id: 8,  name: "Design Tokens",   icon: "🎨",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#E8FBFC" },
    { id: 9,  name: "Archive",         icon: "📦",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#F2F2F2", deactivated: true },
    { id: 10, name: "Components",      icon: "🧩",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#FFF0E8", collaborators: [{initials:"RP", color:"#6A8BE0"}, {initials:"SL", color:"#6AC47B"}] },
    { id: 11, name: "Brand Kit",       icon: "🎯",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#E8F0FD", deactivated: true },
    { id: 12, name: "Wireframes",      icon: "⬜",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#F8F8F8" },
    { id: 13, name: "User Research",   icon: "🔍",  iconUrl: ICON_PLAY,   colorUrl: ICON_PLAY_COLOR,   bg: "#FDEEE8", deactivated: true },
    { id: 14, name: "Motion",          icon: "🎬",  iconUrl: ICON_MAKE,   colorUrl: ICON_MAKE_COLOR,   bg: "#E8F8FD", collaborators: [{initials:"AJ", color:"#E0A96A"}] },
    { id: 15, name: "Dev Handoff",     icon: "📋",  iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: "#F0FDE8" },
  ];

  const CARD_W = 150, CARD_H = 113, GAP = 10, PANEL_PADDING = 12, PEEK = 72;

  const GROUPS = {
    work: { name: 'Work', expanded: false, lastActive: null, color: null, colorIdx: null }
  };

  // Each entry: { img: swatch image URL, bg: CSS color for group background }
  // Images are from Figma node 390:9280
  // swatch = circle fill color (-300 ramp), bg = group pill/container background (-200 ramp)
  // Colors sourced from Figma variable defs on node 390:9280
  const GROUP_COLORS = [
    { swatch: null,      bg: null      },  // none (transparent)
    { swatch: '#f3cfc9', bg: '#f8e5e2' },  // red
    { swatch: '#d4d4ed', bg: '#eaeaf6' },  // violet
    { swatch: '#d2dae4', bg: '#e9edf2' },  // blue
    { swatch: '#e0d4ed', bg: '#f0eaf6' },  // purple
    { swatch: '#f5dfa8', bg: '#faefd4' },  // yellow
    { swatch: '#e8cee1', bg: '#f4e7f0' },  // pink
    { swatch: '#f3d6c9', bg: '#f9ebe4' },  // persimmon
  ];

  let activeTabIndex  = 2;   // "Prototype" starts active
  let hoveredIndex    = activeTabIndex;
  let switcherOpen    = false;
  let backtickHeld    = false;  // true while ` is physically held down
  let frozenState     = null;   // { groupId, widths[] } — left tabs frozen while group is hovered
  let selectedTabIds  = new Set(); // tab IDs selected via Shift+click

  // Original tab type data — captured before any scenario is applied
  const ORIGINAL_TYPES = TABS.map(t => ({ iconUrl: t.iconUrl, colorUrl: t.colorUrl, bg: t.bg }));
  const INITIAL_TABS   = TABS.map(t => ({ ...t }));
  const INITIAL_GROUPS = { work: { name: 'Work', expanded: false, lastActive: null, color: null, colorIdx: null } };

  // Scenario state
  let fileTypeScenarioActive = false;

  // File type → icon/color/bg mapping
  const FILE_TYPE_MAP = {
    design:    { iconUrl: ICON_DESIGN, colorUrl: ICON_PEN_COLOR,    bg: '#EAF3FC' },
    figjam:    { iconUrl: ICON_FIGJAM, colorUrl: ICON_FIGJAM_COLOR, bg: '#F0E8FC' },
    prototype: { iconUrl: ICON_PLAY,   colorUrl: ICON_PLAY_COLOR,   bg: '#E8FAF0' },
    slide:     { iconUrl: ICON_SLIDE,  colorUrl: ICON_SLIDE_COLOR,  bg: '#FDF4E3' },
    make:      { iconUrl: ICON_MAKE,   colorUrl: ICON_MAKE_COLOR,   bg: '#E8F8FD' },
  };

  function applyFileTypeScenario(type) {
    const map = FILE_TYPE_MAP[type];
    TABS.forEach(t => {
      t.iconUrl  = map.iconUrl;
      t.colorUrl = map.colorUrl;
      t.bg       = map.bg;
    });
    renderAll();
  }

  function clearFileTypeScenario() {
    TABS.forEach((t, i) => {
      t.iconUrl  = ORIGINAL_TYPES[i].iconUrl;
      t.colorUrl = ORIGINAL_TYPES[i].colorUrl;
      t.bg       = ORIGINAL_TYPES[i].bg;
    });
    renderAll();
  }

  function timeAgo(date) {
    const s = (Date.now() - date) / 1000;
    if (s < 60)        return "Edited just now";
    if (s < 3600)      return `Edited ${Math.floor(s/60)}m ago`;
    if (s < 86400)     return `Edited ${Math.floor(s/3600)}h ago`;
    if (s < 86400*2)   return "Edited yesterday";
    if (s < 86400*7)   return `Edited ${Math.floor(s/86400)}d ago`;
    return `Edited ${Math.floor(s/604800)}w ago`;
  }

  // Returns HTML for a tab icon
  function iconHtml(tab, emojiPx) {
    if (!tab.iconUrl) {
      const opacity = tab.deactivated ? 0.3 : 1;
      return `<span style="font-size:${emojiPx}px;line-height:1;opacity:${opacity};flex-shrink:0">${tab.icon}</span>`;
    }
    const s = `width:${emojiPx}px;height:${emojiPx}px;object-fit:contain;display:block`;
    if (tab.colorUrl) {
      const defaultCls = tab.monoWhite ? 'tab-icon-default tab-icon-mono-white' : 'tab-icon-default';
      const coloredCls = tab.monoWhite ? 'tab-icon-colored tab-icon-colored-light' : 'tab-icon-colored';
      return `<span class="tab-icon-wrap" style="width:${emojiPx}px;height:${emojiPx}px">` +
        `<img class="${defaultCls}" src="${tab.iconUrl}" alt="" style="${s}">` +
        `<img class="${coloredCls}" src="${tab.colorUrl}" alt="" style="${s}">` +
        `</span>`;
    }
    const opacity = tab.deactivated ? 0.3 : 1;
    return `<img src="${tab.iconUrl}" alt="" style="${s};flex-shrink:0;opacity:${opacity}">`;
  }

  function getColCount() {
    const panelW = Math.min(window.innerWidth * 0.8, 900) - PANEL_PADDING * 2;
    return Math.max(2, Math.floor((panelW + GAP) / (CARD_W + GAP)));
  }

  // ── Render tabstrip ────────────────────────────────────────
  function renderTabstrip() {
    // Keep lastActive up-to-date for any group whose tab is currently active
    const currentTab = TABS[activeTabIndex];
    if (currentTab && currentTab.groupId && GROUPS[currentTab.groupId]) {
      GROUPS[currentTab.groupId].lastActive = currentTab;
    }

    const list = document.getElementById('tabsList');
    list.innerHTML = '';
    const renderedGroups = new Set();

    TABS.forEach((tab, i) => {
      if (tab.groupId) {
        if (renderedGroups.has(tab.groupId)) return;
        renderedGroups.add(tab.groupId);

        const group = GROUPS[tab.groupId];
        const groupTabs = TABS.filter(t => t.groupId === tab.groupId);
        const el = document.createElement('div');
        el.className = 'group-tab' + (group.expanded ? ' expanded' : '');
        el.dataset.dragGroup = tab.groupId;
        if (group.expanded) {
          el.style.flex = groupTabs.length + ' 1 0';
          if (group.color) el.style.background = group.color;
        }

        if (!group.expanded) {
          const activeGroupTab = groupTabs.find(t => TABS.indexOf(t) === activeTabIndex);
          const displayTab = activeGroupTab || group.lastActive;
          const displayIdx = displayTab ? TABS.indexOf(displayTab) : -1;
          const isCurrentlyActive = displayTab && displayTab === activeGroupTab;

          const activeChipHtml = displayTab ? `
            <div class="sub-tab${isCurrentlyActive ? ' active' : ''}" data-id="${displayIdx}">
              <span class="sub-tab-icon">${iconHtml(displayTab, 11, 16)}</span>
              <span class="sub-tab-name">${displayTab.name}</span>
              <span class="sub-tab-close">${CLOSE_IMG}</span>
            </div>` : '';

          el.innerHTML = `<span class="group-label">${group.name}</span>${activeChipHtml}`;
          if (group.color) el.querySelector('.group-label').style.background = group.color;

          el.addEventListener('click', (e) => {
            if (e.target.closest('.sub-tab')) return;
            expandGroup(tab.groupId, el);
          });

          if (displayTab) {
            const subEl = el.querySelector('.sub-tab');
            subEl.addEventListener('mousedown', e => e.stopPropagation());
            subEl.addEventListener('click', (e) => {
              if (e.target.classList.contains('sub-tab-close')) return;
              e.stopPropagation();
              setActiveTab(displayIdx);
            });
            subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
              e.stopPropagation();
              TABS[displayIdx].groupId = null;
              if (!TABS.some(t => t.groupId === tab.groupId)) delete GROUPS[tab.groupId];
              renderTabstrip();
            });
            attachDragHandlers(subEl, 'subtab', displayIdx, tab.groupId);
          }
        } else {
          const subTabsHtml = groupTabs.map(t => {
            const tabIdx = TABS.indexOf(t);
            const isActive = tabIdx === activeTabIndex;
            return `<div class="sub-tab${isActive ? ' active' : ''}" data-id="${tabIdx}">
              <span class="sub-tab-icon">${iconHtml(t, 11, 16)}</span>
              <span class="sub-tab-name">${t.name}</span>
              <span class="sub-tab-close">${CLOSE_IMG}</span>
            </div>`;
          }).join('');

          el.innerHTML = `
            <span class="group-label">${group.name}</span>
            <div class="group-subtabs">${subTabsHtml}</div>
          `;

          el.querySelector('.group-label').addEventListener('click', (e) => {
            e.stopPropagation();
            collapseGroup(tab.groupId, el);
          });

          el.querySelectorAll('.sub-tab').forEach(subEl => {
            const idx = parseInt(subEl.dataset.id);
            subEl.addEventListener('mousedown', (e) => e.stopPropagation());
            attachDragHandlers(subEl, 'subtab', idx, tab.groupId);
            subEl.addEventListener('click', (e) => {
              if (e.target.classList.contains('sub-tab-close')) return;
              setActiveTab(idx);
            });
            subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
              e.stopPropagation();
              TABS[idx].groupId = null;
              const remaining = TABS.filter(t => t.groupId === tab.groupId);
              if (remaining.length === 0) group.expanded = false;
              renderTabstrip();
            });
          });
        }

        el.addEventListener('mouseenter', () => freezeLeftTabs(el));
        attachDragHandlers(el, 'group', null, tab.groupId);
        list.appendChild(el);
        return;
      }

      const el = document.createElement('div');
      const isSelected = selectedTabIds.has(tab.id);
      // During a shift-selection, only explicitly selected tabs get the active appearance.
      // The activeTabIndex tab looks normal unless it's also shift-selected, so the user
      // can clearly see which tabs are actually in their selection.
      const showActive = selectedTabIds.size > 0 ? isSelected : (i === activeTabIndex);
      el.className = 'tab' + (showActive ? ' active' : '') + (tab.deactivated ? ' deactivated' : '');
      el.dataset.dragIdx = i;
      el.innerHTML = `
        <span class="tab-icon">${iconHtml(tab, 13, 26)}</span>
        <span class="tab-name">${tab.name}</span>
        <span class="tab-close">${CLOSE_IMG}</span>
      `;
      el.addEventListener('click', (e) => {
        if (e.target.closest('.tab-close')) return;
        if (e.shiftKey) {
          const id = tab.id;
          if (selectedTabIds.has(id)) selectedTabIds.delete(id);
          else selectedTabIds.add(id);
          renderTabstrip();
          return;
        }
        selectedTabIds.clear();
        setActiveTab(i);
      });
      el.querySelector('.tab-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(i);
      });
      attachDragHandlers(el, 'tab', i, null);
      list.appendChild(el);
    });
  }

  // ── Render canvas ──────────────────────────────────────────
  function renderCanvas() {
    const tab = TABS[activeTabIndex];
    document.getElementById('canvasIcon').textContent = tab.icon;
    document.getElementById('canvasName').textContent = tab.name;
  }

  // ── Render switcher grid ────────────────────────────────────
  function renderSwitcher() {
    const cols = getColCount();
    const rows = Math.ceil(TABS.length / cols);
    const contentH = PANEL_PADDING * 2 + rows * CARD_H + (rows - 1) * GAP;
    const maxH = rows <= 2 ? contentH : PANEL_PADDING * 2 + CARD_H * 2 + GAP + PEEK;
    const panel = document.getElementById('switcherPanel');
    panel.style.maxHeight = maxH + 'px';
    panel.style.width = (cols * CARD_W + (cols - 1) * GAP + PANEL_PADDING * 2) + 'px';

    const grid = document.getElementById('switcherGrid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${cols}, ${CARD_W}px)`;

    TABS.forEach((tab, i) => {
      const card = document.createElement('div');
      card.className = 'tab-card' + (i === hoveredIndex ? ' selected' : '');
      card.id = `card-${i}`;

      const avatarsHtml = (tab.collaborators || []).map(a =>
        `<div class="avatar" style="background:${a.color}">${a.initials}</div>`
      ).join('');

      card.innerHTML = `
        <div class="tab-card-thumb" style="background:${tab.bg}"></div>
        <div class="tab-card-info">
          <div class="tab-card-title">
            <span class="tab-type-icon">${iconHtml(tab, 11, 20)}</span>
            <span class="tab-card-name">${tab.name}</span>
          </div>
          ${avatarsHtml ? `<div class="tab-avatars">${avatarsHtml}</div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });

    // Instantly snap panel scroll to show selected card
    requestAnimationFrame(() => {
      const panel = document.getElementById('switcherPanel');
      const card  = document.getElementById(`card-${hoveredIndex}`);
      if (!card || !panel) return;
      const cardTop    = card.offsetTop;
      const cardBottom = cardTop + card.offsetHeight;
      if (cardBottom > panel.scrollTop + panel.clientHeight) {
        panel.scrollTop = cardBottom - panel.clientHeight + GAP;
      } else if (cardTop < panel.scrollTop) {
        panel.scrollTop = cardTop - GAP;
      }
    });
  }

  // ── Group tab X-position freeze ────────────────────────────
  // Freeze pixel widths of every tab to the LEFT of the group tab so that
  // expand/collapse only resizes tabs to the RIGHT. Unfreezes on tabstrip mouseleave.

  function freezeLeftTabs(groupEl) {
    if (frozenState) return;
    const list = document.getElementById('tabsList');
    const allItems = [...list.children];
    const groupIdx = allItems.indexOf(groupEl);
    if (groupIdx <= 0) return;
    const widths = [];
    for (let i = 0; i < groupIdx; i++) {
      const w = allItems[i].getBoundingClientRect().width;
      widths.push(w);
      allItems[i].style.flex    = `0 0 ${w}px`;
      allItems[i].style.minWidth = `${w}px`;
      allItems[i].style.maxWidth = `${w}px`;
    }
    frozenState = { groupId: groupEl.dataset.dragGroup, widths };
  }

  function applyFrozenState() {
    if (!frozenState) return;
    const list = document.getElementById('tabsList');
    const allItems = [...list.children];
    const groupEl = list.querySelector(`[data-drag-group="${frozenState.groupId}"]`);
    if (!groupEl) return;
    const groupIdx = allItems.indexOf(groupEl);
    frozenState.widths.forEach((w, i) => {
      if (i < groupIdx && allItems[i]) {
        allItems[i].style.flex     = `0 0 ${w}px`;
        allItems[i].style.minWidth = `${w}px`;
        allItems[i].style.maxWidth = `${w}px`;
      }
    });
  }

  function unfreezeTabs() {
    if (!frozenState) return;
    frozenState = null;
    const list = document.getElementById('tabsList');
    // Clear all frozen constraints first so the strip can reflow naturally
    [...list.children].forEach(el => {
      el.style.minWidth = '';
      el.style.maxWidth = '';
      el.style.flex = '';
    });
    // For each expanded group, compute flex-grow so sub-tabs equal regular tab width.
    // Formula derivation: if grow × T = overhead + N × T (where T = strip/(M + grow)),
    // solving gives: grow = (overhead × M + stripW × N) / (stripW - overhead).
    const stripW = list.offsetWidth;
    const M = list.querySelectorAll('.tab').length;
    list.querySelectorAll('.group-tab.expanded').forEach(groupEl => {
      const groupId = groupEl.dataset.dragGroup;
      const N = TABS.filter(t => t.groupId === groupId).length;
      const labelEl = groupEl.querySelector('.group-label');
      const labelW = labelEl ? labelEl.offsetWidth : 50;
      const overhead = 20 + labelW + Math.max(0, N - 1) * 3;
      groupEl.style.flex = (stripW > overhead
        ? (overhead * M + stripW * N) / (stripW - overhead)
        : N) + ' 1 0';
    });
  }

  // ── Group expand / collapse animations ─────────────────────

  // Rebuilds a single group element in-place, leaving all other tabs untouched.
  function rebuildGroupElement(groupId, oldEl) {
    const currentTab = TABS[activeTabIndex];
    if (currentTab && currentTab.groupId === groupId) {
      GROUPS[groupId].lastActive = currentTab;
    }

    const group = GROUPS[groupId];
    const groupTabs = TABS.filter(t => t.groupId === groupId);
    const el = document.createElement('div');
    el.className = 'group-tab' + (group.expanded ? ' expanded' : '');
    el.dataset.dragGroup = groupId;
    if (group.expanded) {
      el.style.flex = groupTabs.length + ' 1 0';
      if (group.color) el.style.background = group.color;
    }

    if (!group.expanded) {
      const activeGroupTab = groupTabs.find(t => TABS.indexOf(t) === activeTabIndex);
      const displayTab = activeGroupTab || group.lastActive;
      const displayIdx = displayTab ? TABS.indexOf(displayTab) : -1;
      const isCurrentlyActive = displayTab && displayTab === activeGroupTab;

      const activeChipHtml = displayTab ? `
        <div class="sub-tab${isCurrentlyActive ? ' active' : ''}" data-id="${displayIdx}">
          <span class="sub-tab-icon">${iconHtml(displayTab, 11, 16)}</span>
          <span class="sub-tab-name">${displayTab.name}</span>
          <span class="sub-tab-close">${CLOSE_IMG}</span>
        </div>` : '';

      el.innerHTML = `<span class="group-label">${group.name}</span>${activeChipHtml}`;
      if (group.color) el.querySelector('.group-label').style.background = group.color;

      el.addEventListener('click', (e) => {
        if (e.target.closest('.sub-tab')) return;
        expandGroup(groupId, el);
      });

      if (displayTab) {
        const subEl = el.querySelector('.sub-tab');
        subEl.addEventListener('mousedown', e => e.stopPropagation());
        subEl.addEventListener('click', (e) => {
          if (e.target.classList.contains('sub-tab-close')) return;
          e.stopPropagation();
          setActiveTab(displayIdx);
        });
        subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          TABS[displayIdx].groupId = null;
          if (!TABS.some(t => t.groupId === groupId)) delete GROUPS[groupId];
          renderTabstrip();
        });
        attachDragHandlers(subEl, 'subtab', displayIdx, groupId);
      }
    } else {
      const subTabsHtml = groupTabs.map(t => {
        const tabIdx = TABS.indexOf(t);
        const isActive = tabIdx === activeTabIndex;
        return `<div class="sub-tab${isActive ? ' active' : ''}" data-id="${tabIdx}">
          <span class="sub-tab-icon">${iconHtml(t, 11, 16)}</span>
          <span class="sub-tab-name">${t.name}</span>
          <span class="sub-tab-close">${CLOSE_IMG}</span>
        </div>`;
      }).join('');

      el.innerHTML = `
        <span class="group-label">${group.name}</span>
        <div class="group-subtabs">${subTabsHtml}</div>
      `;

      el.querySelector('.group-label').addEventListener('click', (e) => {
        e.stopPropagation();
        collapseGroup(groupId, el);
      });

      el.querySelectorAll('.sub-tab').forEach(subEl => {
        const idx = parseInt(subEl.dataset.id);
        subEl.addEventListener('mousedown', (e) => e.stopPropagation());
        attachDragHandlers(subEl, 'subtab', idx, groupId);
        subEl.addEventListener('click', (e) => {
          if (e.target.classList.contains('sub-tab-close')) return;
          setActiveTab(idx);
        });
        subEl.querySelector('.sub-tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          TABS[idx].groupId = null;
          const remaining = TABS.filter(t => t.groupId === groupId);
          if (remaining.length === 0) group.expanded = false;
          renderTabstrip();
        });
      });
    }

    el.addEventListener('mouseenter', () => freezeLeftTabs(el));
    attachDragHandlers(el, 'group', null, groupId);
    oldEl.replaceWith(el);
    return el;
  }

  function measureCollapsedWidth(groupId) {
    const group = GROUPS[groupId];
    const groupTabs = TABS.filter(t => t.groupId === groupId);
    const activeGroupTab = groupTabs.find(t => TABS.indexOf(t) === activeTabIndex);
    const displayTab = activeGroupTab || group.lastActive;

    const tmp = document.createElement('div');
    tmp.className = 'group-tab';
    tmp.style.cssText = 'visibility:hidden;position:absolute;top:0;pointer-events:none;';

    let chipHtml = '';
    if (displayTab) {
      const idx = TABS.indexOf(displayTab);
      chipHtml = `<div class="sub-tab${activeGroupTab ? ' active' : ''}" data-id="${idx}">
        <span class="sub-tab-icon">${iconHtml(displayTab, 11, 16)}</span>
        <span class="sub-tab-name">${displayTab.name}</span>
        <span class="sub-tab-close">${CLOSE_IMG}</span>
      </div>`;
    }

    tmp.innerHTML = `<span class="group-label">${group.name}</span>${chipHtml}`;
    document.getElementById('tabstrip').appendChild(tmp);
    const w = tmp.offsetWidth;
    tmp.remove();
    return w;
  }

  function expandGroup(groupId, pillEl) {
    const startW = pillEl.offsetWidth;

    // Measure a regular tab's width NOW (before any DOM changes) so we can
    // compute the correct expanded width for the group.
    const list = document.getElementById('tabsList');
    const regularTab = list.querySelector('.tab');
    const regularTabW = regularTab ? regularTab.offsetWidth : startW;
    const groupTabs = TABS.filter(t => t.groupId === groupId);

    // Measure pill geometry BEFORE re-render while it still exists in DOM
    const labelEl = pillEl.querySelector('.group-label');
    const containerRect = pillEl.getBoundingClientRect();
    const labelRect = labelEl.getBoundingClientRect();
    const pillLeft = labelRect.left - containerRect.left;
    const pillTop  = labelRect.top  - containerRect.top;
    const pillW    = labelRect.width;
    const pillH    = labelRect.height;

    // Update state and rebuild just this group element
    GROUPS[groupId].expanded = true;
    const hasActiveSubTab = TABS.some((t, i) => t.groupId === groupId && i === activeTabIndex);
    if (!hasActiveSubTab) GROUPS[groupId].lastActive = null;
    const el = rebuildGroupElement(groupId, pillEl);
    applyFrozenState();

    // Compute endW analytically so sub-tabs each get regularTabW.
    // group-tab layout: 8px left-pad | label | 4px gap | [subtab (3px gap subtab …)] | 8px right-pad
    const expandedLabel = el.querySelector('.group-label');
    const labelW = expandedLabel ? expandedLabel.offsetWidth : 50;
    const subTabGapTotal = Math.max(0, groupTabs.length - 1) * 3;
    const endW = 8 + labelW + 4 + groupTabs.length * regularTabW + subTabGapTotal + 8;

    // Use flex-basis:auto during the animation so the browser uses the animated
    // `width` property as the flex-basis each frame — right tabs then resize
    // gradually alongside the group instead of snapping instantly.
    el.style.flex = '0 0 auto';

    // Stacking context so the overlay stays clipped inside the container
    el.style.position   = 'relative';
    el.style.isolation  = 'isolate';
    el.style.background = 'transparent'; // suppress CSS green until overlay fills it

    // Lift content above overlay
    el.querySelectorAll('.group-label, .group-subtabs, .sub-tab').forEach(c => {
      c.style.position = 'relative';
      c.style.zIndex   = '1';
    });

    // Overlay starts at the collapsed pill's exact position
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:absolute;left:${pillLeft}px;top:${pillTop}px;` +
      `width:${pillW}px;height:${pillH}px;background:var(--color-group);` +
      `border-radius:5px;pointer-events:none;z-index:0;`;
    el.insertBefore(overlay, el.firstChild);

    const chips = el.querySelectorAll('.group-subtabs');
    chips.forEach(c => { c.style.opacity = '0'; c.style.transition = 'none'; });
    el.style.width = startW + 'px';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const ease = 'cubic-bezier(0.4,0,0.2,1)';
      el.style.transition = `width 200ms ${ease}`;
      el.style.width = endW + 'px';

      // Pill expands to fill container — text stays fixed, overlay moves around it
      overlay.style.transition =
        `left 200ms ${ease},top 200ms ${ease},width 200ms ${ease},height 200ms ${ease},border-radius 200ms ${ease}`;
      overlay.style.left         = '0';
      overlay.style.top          = '0';
      overlay.style.width        = endW + 'px';
      overlay.style.height       = '38px';
      overlay.style.borderRadius = '0';

      setTimeout(() => {
        chips.forEach(c => {
          c.style.transition = 'opacity 140ms ease';
          c.style.opacity    = '1';
        });
      }, 60);

      const onDone = (e) => {
        if (e.target !== el || e.propertyName !== 'width') return;
        el.removeEventListener('transitionend', onDone);
        el.style.position = el.style.isolation = el.style.background =
          el.style.width = el.style.transition = '';
        overlay.remove();
        el.querySelectorAll('.group-label, .group-subtabs, .sub-tab').forEach(c => {
          c.style.position = c.style.zIndex = c.style.opacity = c.style.transition = '';
        });
        // Keep fixed during frozen state; otherwise compute grow so sub-tabs = regular tab width
        if (frozenState) {
          el.style.flex = '0 0 ' + endW + 'px';
        } else {
          const stripW2 = list.offsetWidth;
          const M2 = list.querySelectorAll('.tab').length;
          const lbl2 = el.querySelector('.group-label');
          const lblW2 = lbl2 ? lbl2.offsetWidth : 50;
          const ovhd2 = 20 + lblW2 + Math.max(0, groupTabs.length - 1) * 3;
          el.style.flex = (stripW2 > ovhd2
            ? (ovhd2 * M2 + stripW2 * groupTabs.length) / (stripW2 - ovhd2)
            : groupTabs.length) + ' 1 0';
        }
      };
      el.addEventListener('transitionend', onDone);
    }));
  }

  function collapseGroup(groupId, el) {
    const startW = el.offsetWidth;
    const endW   = measureCollapsedWidth(groupId);

    // Target pill geometry from design spec (24px tall, 8px from left, centered vertically)
    const labelEl = el.querySelector('.group-label');
    const pillW    = labelEl.offsetWidth;
    const pillH    = 24;
    const pillLeft = 8;   // container padding-left
    const pillTop  = 7;   // (38 - 24) / 2

    // Stacking context
    el.style.position   = 'relative';
    el.style.isolation  = 'isolate';
    el.style.background = 'transparent';

    el.querySelectorAll('.group-label, .group-subtabs, .sub-tab').forEach(c => {
      c.style.position = 'relative';
      c.style.zIndex   = '1';
    });

    // Overlay starts filling the full container
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:absolute;left:0;top:0;width:100%;height:100%;` +
      `background:var(--color-group);border-radius:0;pointer-events:none;z-index:0;`;
    el.insertBefore(overlay, el.firstChild);

    const chips = el.querySelectorAll('.group-subtabs');
    // Switch to auto flex-basis so the animated width drives flex allocation each
    // frame — right tabs grow gradually rather than jumping at the end.
    el.style.flex = '0 0 auto';
    el.style.width = startW + 'px';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const ease = 'cubic-bezier(0.4,0,0.2,1)';
      el.style.transition = `width 190ms ${ease}`;
      el.style.width = endW + 'px';

      chips.forEach(c => {
        c.style.transition = 'opacity 110ms ease';
        c.style.opacity    = '0';
      });

      // Overlay shrinks back to pill dimensions — text stays fixed
      overlay.style.transition =
        `left 190ms ${ease},top 190ms ${ease},width 190ms ${ease},height 190ms ${ease},border-radius 190ms ${ease}`;
      overlay.style.left         = pillLeft + 'px';
      overlay.style.top          = pillTop  + 'px';
      overlay.style.width        = pillW    + 'px';
      overlay.style.height       = pillH    + 'px';
      overlay.style.borderRadius = '5px';

      const onDone = (e) => {
        if (e.target !== el || e.propertyName !== 'width') return;
        el.removeEventListener('transitionend', onDone);
        GROUPS[groupId].expanded = false;
        rebuildGroupElement(groupId, el);
        applyFrozenState();
      };
      el.addEventListener('transitionend', onDone);
    }));
  }

  // ── Drag & drop ────────────────────────────────────────────
  let drag = null;
  const dropLine = (() => {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;width:2px;border-radius:2px;background:rgba(0,122,255,0.9);pointer-events:none;z-index:9998;display:none;';
    document.body.appendChild(el);
    return el;
  })();

  function attachDragHandlers(el, kind, tabIdx, groupId) {
    el.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      const sx = e.clientX, sy = e.clientY;
      let started = false;
      const tryStart = (ev) => {
        if (started || Math.hypot(ev.clientX - sx, ev.clientY - sy) < 4) return;
        started = true; cleanup();
        beginDrag(ev, kind, tabIdx, groupId, el);
      };
      const cleanup = () => {
        document.removeEventListener('mousemove', tryStart);
        document.removeEventListener('mouseup', cleanup);
      };
      document.addEventListener('mousemove', tryStart);
      document.addEventListener('mouseup', cleanup);
    });
  }

  function beginDrag(e, kind, tabIdx, groupId, sourceEl) {
    e.preventDefault();
    const r = sourceEl.getBoundingClientRect();
    const ghost = sourceEl.cloneNode(true);
    Object.assign(ghost.style, {
      position:'fixed', pointerEvents:'none', zIndex:'9999',
      width: r.width+'px', height: r.height+'px',
      left: r.left+'px', top: r.top+'px',
      opacity:'0.88', transform:'scale(1.04)',
      boxShadow:'0 4px 20px rgba(0,0,0,0.22)',
      borderRadius:'6px', transition:'none'
    });
    document.body.appendChild(ghost);
    sourceEl.style.opacity = '0.28';
    drag = { kind, tabIdx, groupId, ghost, sourceEl,
      offX: e.clientX - r.left, offY: e.clientY - r.top, dropInfo: null };
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }

  function onDragMove(e) {
    if (!drag) return;
    drag.ghost.style.left = (e.clientX - drag.offX) + 'px';
    drag.ghost.style.top  = (e.clientY - drag.offY) + 'px';
    document.querySelectorAll('.drop-into-group').forEach(el => el.classList.remove('drop-into-group'));
    drag.dropInfo = calcDropInfo(e.clientX, e.clientY);
    if (!drag.dropInfo) { dropLine.style.display = 'none'; return; }
    if (drag.dropInfo.kind === 'into-group') {
      drag.dropInfo.el.classList.add('drop-into-group');
      dropLine.style.display = 'none';
    } else {
      const sr = document.getElementById('tabstrip').getBoundingClientRect();
      Object.assign(dropLine.style, {
        display:'block', left:(drag.dropInfo.x - 1)+'px',
        top:(sr.top + 5)+'px', height:(sr.height - 10)+'px'
      });
    }
  }

  function onDragEnd() {
    if (!drag) return;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    drag.ghost.remove();
    drag.sourceEl.style.opacity = '';
    dropLine.style.display = 'none';
    document.querySelectorAll('.drop-into-group').forEach(el => el.classList.remove('drop-into-group'));
    if (drag.dropInfo) applyDrop(drag.dropInfo);
    drag = null;
    renderTabstrip();
  }

  function calcDropInfo(x, y) {
    const sr = document.getElementById('tabstrip').getBoundingClientRect();
    if (y < sr.top || y > sr.bottom) return null;
    const items = [...document.getElementById('tabsList').querySelectorAll('[data-drag-idx],[data-drag-group]')];
    if (!items.length) return null;
    for (const item of items) {
      const r = item.getBoundingClientRect();
      if (x > r.right) continue;
      if (x < r.left) return { kind:'before', el:item, x:r.left };
      // Over this item — middle zone on a group = drop into
      const isGroup = item.hasAttribute('data-drag-group');
      const gId = item.dataset.dragGroup;
      const canInto = isGroup && drag.kind !== 'group' &&
        !(drag.kind === 'subtab' && drag.groupId === gId);
      if (canInto && x > r.left + r.width * 0.2 && x < r.right - r.width * 0.2)
        return { kind:'into-group', el:item, groupId:gId };
      return x < r.left + r.width / 2
        ? { kind:'before', el:item, x:r.left }
        : { kind:'after',  el:item, x:r.right };
    }
    const last = items[items.length - 1];
    return { kind:'after', el:last, x:last.getBoundingClientRect().right };
  }

  function applyDrop(info) {
    const activeTab = TABS[activeTabIndex]; // track by reference through mutations

    // ── Drop into group ────────────────────────────────────
    if (info.kind === 'into-group') {
      const tab = TABS[drag.tabIdx];
      const oldGroup = tab.groupId;
      tab.groupId = info.groupId;
      const memberIdxs = TABS.map((t, i) => (t.groupId === info.groupId && i !== drag.tabIdx) ? i : -1).filter(i => i >= 0);
      if (memberIdxs.length) {
        const insertAfter = Math.max(...memberIdxs);
        const [moved] = TABS.splice(drag.tabIdx, 1);
        const pos = drag.tabIdx <= insertAfter ? insertAfter : insertAfter + 1;
        TABS.splice(Math.min(pos, TABS.length), 0, moved);
      }
      GROUPS[info.groupId].expanded = true;
      if (oldGroup && oldGroup !== info.groupId && !TABS.some(t => t.groupId === oldGroup))
        delete GROUPS[oldGroup];
      activeTabIndex = TABS.indexOf(activeTab);
      return;
    }

    const isAfter = info.kind === 'after';

    function insertPoint(targetEl) {
      if (targetEl.hasAttribute('data-drag-idx')) {
        const idx = parseInt(targetEl.dataset.dragIdx);
        return isAfter ? idx + 1 : idx;
      }
      const gId = targetEl.dataset.dragGroup;
      const gIdxs = TABS.map((t, i) => t.groupId === gId ? i : -1).filter(i => i >= 0);
      return isAfter ? Math.max(...gIdxs) + 1 : Math.min(...gIdxs);
    }

    // ── Move group ─────────────────────────────────────────
    if (drag.kind === 'group') {
      if (info.el.dataset.dragGroup === drag.groupId) return;
      const groupTabs = TABS.filter(t => t.groupId === drag.groupId);
      const curIdxs  = TABS.map((t, i) => t.groupId === drag.groupId ? i : -1).filter(i => i >= 0);
      let at = insertPoint(info.el);
      const before = curIdxs.filter(i => i < at).length;
      for (let i = TABS.length - 1; i >= 0; i--)
        if (TABS[i].groupId === drag.groupId) TABS.splice(i, 1);
      at = Math.max(0, Math.min(at - before, TABS.length));
      TABS.splice(at, 0, ...groupTabs);

    // ── Move tab or sub-tab (drops standalone) ─────────────
    } else {
      const tab = TABS[drag.tabIdx];
      const oldGroup = tab.groupId;
      // If dropping onto same group item, don't ungroup — just bail
      if (info.el.dataset.dragGroup === tab.groupId) return;
      let at = insertPoint(info.el);
      TABS.splice(drag.tabIdx, 1);
      tab.groupId = null;
      if (drag.tabIdx < at) at--;
      at = Math.max(0, Math.min(at, TABS.length));
      TABS.splice(at, 0, tab);
      if (oldGroup && !TABS.some(t => t.groupId === oldGroup)) delete GROUPS[oldGroup];
    }

    activeTabIndex = TABS.indexOf(activeTab);
  }

  function closeTab(index) {
    const tab = TABS[index];

    // If tab is in a group, handle group dissolution
    if (tab.groupId) {
      const remaining = TABS.filter((t, i) => t.groupId === tab.groupId && i !== index);
      if (remaining.length === 0) {
        delete GROUPS[tab.groupId];
      } else if (remaining.length === 1) {
        remaining[0].groupId = null;
        delete GROUPS[tab.groupId];
      }
    }

    TABS.splice(index, 1);

    // Keep ORIGINAL_TYPES in sync
    ORIGINAL_TYPES.splice(index, 1);

    // Adjust active index
    if (TABS.length === 0) {
      activeTabIndex = 0;
    } else if (activeTabIndex >= TABS.length) {
      activeTabIndex = TABS.length - 1;
    } else if (index < activeTabIndex) {
      activeTabIndex--;
    }

    renderAll();
  }

  function setActiveTab(index) {
    activeTabIndex = index;
    const currentTab = TABS[activeTabIndex];
    if (currentTab && currentTab.groupId && GROUPS[currentTab.groupId]) {
      GROUPS[currentTab.groupId].lastActive = currentTab;
    }
    const list = document.getElementById('tabsList');
    list.querySelectorAll('.tab').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.dragIdx) === activeTabIndex);
    });
    list.querySelectorAll('.sub-tab').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.id) === activeTabIndex);
    });
    renderCanvas();
  }

  function renderAll() {
    renderTabstrip();
    renderCanvas();
  }

  // ── Switcher open/close ────────────────────────────────────
  function openSwitcher() {
    if (!switcherOpen) {
      switcherOpen = true;
      renderSwitcher();
      document.getElementById('switcherOverlay').classList.add('visible');
      document.getElementById('overviewBtn').classList.add('active');
    }
  }

  function closeSwitcher(commit) {
    if (!switcherOpen) return;
    switcherOpen = false;
    if (commit) activeTabIndex = hoveredIndex;
    else hoveredIndex = activeTabIndex;
    document.getElementById('switcherOverlay').classList.remove('visible');
    document.getElementById('overviewBtn').classList.remove('active');
    renderAll();
  }

  // ── Keyboard ───────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    // Backtick — hold to keep open, release to commit (mirrors macOS App Switcher)
    if (e.key === '`' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      if (!e.repeat && !backtickHeld) {
        backtickHeld = true;
        hoveredIndex = activeTabIndex;
        openSwitcher();
      }
      return;
    }

    if (!switcherOpen) return;

    const cols = getColCount();

    if (e.key === 'ArrowRight') {
      e.preventDefault();
      hoveredIndex = (hoveredIndex + 1) % TABS.length;
      renderSwitcher();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      hoveredIndex = (hoveredIndex - 1 + TABS.length) % TABS.length;
      renderSwitcher();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      hoveredIndex = Math.min(hoveredIndex + cols, TABS.length - 1);
      renderSwitcher();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      hoveredIndex = Math.max(hoveredIndex - cols, 0);
      renderSwitcher();
    } else if (e.key === 'Escape') {
      backtickHeld = false;
      closeSwitcher(false);
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.key === '`' && backtickHeld) {
      backtickHeld = false;
      closeSwitcher(true);
    }
  });

  // Click button = toggle (no hold concept for mouse)
  document.getElementById('overviewBtn').addEventListener('click', () => {
    if (switcherOpen) { closeSwitcher(true); } else { hoveredIndex = activeTabIndex; openSwitcher(); }
  });

  window.addEventListener('resize', () => {
    if (switcherOpen) renderSwitcher();
  });

  // ── Settings panel ────────────────────────────────────────────
  const settingsBtn   = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');

  settingsBtn.addEventListener('click', () => {
    const isOpen = !settingsPanel.hidden;
    settingsPanel.hidden = isOpen;
    settingsBtn.classList.toggle('open', !isOpen);
  });

  document.addEventListener('click', (e) => {
    if (!settingsPanel.hidden &&
        !settingsPanel.contains(e.target) &&
        e.target !== settingsBtn) {
      settingsPanel.hidden = true;
      settingsBtn.classList.remove('open');
    }
  });

  // ── File type scenario ────────────────────────────────────────────
  const fileTypeToggle = document.getElementById('fileTypeToggle');
  const fileTypeSelect = document.getElementById('fileTypeSelect');

  function syncFileTypeToggle() {
    fileTypeToggle.textContent = fileTypeScenarioActive ? 'On' : 'Off';
    fileTypeToggle.classList.toggle('active', fileTypeScenarioActive);
    fileTypeSelect.disabled = !fileTypeScenarioActive;
    fileTypeSelect.style.opacity = fileTypeScenarioActive ? '1' : '0.4';
  }

  fileTypeToggle.addEventListener('click', () => {
    fileTypeScenarioActive = !fileTypeScenarioActive;
    if (fileTypeScenarioActive) {
      applyFileTypeScenario(fileTypeSelect.value);
    } else {
      clearFileTypeScenario();
    }
    syncFileTypeToggle();
  });

  fileTypeSelect.addEventListener('change', () => {
    if (fileTypeScenarioActive) applyFileTypeScenario(fileTypeSelect.value);
  });

  syncFileTypeToggle();

  // ── Reset ─────────────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', () => {
    // Restore tabs
    TABS.length = 0;
    INITIAL_TABS.forEach(t => TABS.push({ ...t }));

    // Restore original types in sync
    ORIGINAL_TYPES.length = 0;
    INITIAL_TABS.forEach(t => ORIGINAL_TYPES.push({ iconUrl: t.iconUrl, colorUrl: t.colorUrl, bg: t.bg }));

    // Restore groups
    Object.keys(GROUPS).forEach(k => delete GROUPS[k]);
    Object.keys(INITIAL_GROUPS).forEach(k => { GROUPS[k] = { ...INITIAL_GROUPS[k] }; });

    // Clear scenario
    fileTypeScenarioActive = false;
    syncFileTypeToggle();

    // Reset active index and re-render
    activeTabIndex = 2;
    hoveredIndex   = 2;
    if (switcherOpen) closeSwitcher(false);
    frozenState = null;
    renderAll();
  });

  // ── Sub-tab style toggle ───────────────────────────────────
  const subtabToggle = document.getElementById('subtabStyleToggle');
  function isChipStyle() { return document.documentElement.dataset.subtab === 'chip'; }
  function syncSubtabToggle() {
    subtabToggle.textContent = isChipStyle() ? '⬡ Match tabs' : '⬡ Chip style';
  }
  subtabToggle.addEventListener('click', () => {
    document.documentElement.dataset.subtab = isChipStyle() ? '' : 'chip';
    syncSubtabToggle();
  });
  syncSubtabToggle();

  // ── Theme toggle ───────────────────────────────────────────
  const themeToggle = document.getElementById('themeToggle');
  function isDark() {
    const t = document.documentElement.dataset.theme;
    return t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  function syncToggle() {
    themeToggle.textContent = isDark() ? '☀️ Light' : '🌙 Dark';
  }
  themeToggle.addEventListener('click', () => {
    document.documentElement.dataset.theme = isDark() ? 'light' : 'dark';
    syncToggle();
  });
  syncToggle();

  // ── Context menu ────────────────────────────────────────────
  let activeCtxMenu = null;

  function hideContextMenu() {
    if (activeCtxMenu) { activeCtxMenu.remove(); activeCtxMenu = null; }
  }

  function buildMenuEl(items) {
    const menu = document.createElement('div');
    menu.className = 'ctx-menu';
    for (const item of items) {
      if (item === '---') {
        const sep = document.createElement('div');
        sep.className = 'ctx-sep';
        menu.appendChild(sep);
      } else if (item.type === 'group-header') {
        menu.appendChild(buildGroupHeader(item.groupId));
      } else {
        const el = document.createElement('div');
        el.className = 'ctx-item' + (item.submenu ? ' ctx-has-submenu' : '');
        el.innerHTML =
          item.label +
          (item.trail ? `<span class="ctx-trail">${item.trail}</span>` : '') +
          (item.submenu ? `<span class="ctx-arrow">›</span>` : '');
        if (item.action) {
          el.addEventListener('mousedown', e => {
            e.stopPropagation();
            item.action();
            hideContextMenu();
          });
        }
        if (item.submenu) {
          const sub = buildMenuEl(item.submenu);
          sub.classList.add('ctx-submenu');
          el.appendChild(sub);
          // JS-controlled submenu — timer-based to survive the gap between item and submenu
          let hideTimer = null;
          const showSub  = () => { clearTimeout(hideTimer); sub.classList.add('ctx-submenu-visible'); };
          const hideSub  = () => { hideTimer = setTimeout(() => sub.classList.remove('ctx-submenu-visible'), 120); };
          el.addEventListener('mouseenter', showSub);
          el.addEventListener('mouseleave', hideSub);
          sub.addEventListener('mouseenter', showSub);
          sub.addEventListener('mouseleave', hideSub);
        }
        menu.appendChild(el);
      }
    }
    return menu;
  }

  // Applies group.color to the correct element depending on collapsed/expanded state:
  // collapsed → .group-label (the colored pill); expanded → .group-tab itself
  function applyGroupColor(groupId) {
    const group = GROUPS[groupId];
    const groupEl = document.querySelector(`[data-drag-group="${groupId}"]`);
    if (!groupEl) return;
    if (group.expanded) {
      groupEl.style.background = group.color || '';
    } else {
      const labelEl = groupEl.querySelector('.group-label');
      if (labelEl) labelEl.style.background = group.color || '';
    }
  }

  function buildGroupHeader(groupId) {
    const group = GROUPS[groupId];
    const header = document.createElement('div');
    header.className = 'ctx-group-header';

    const input = document.createElement('input');
    input.className = 'ctx-group-name-input';
    input.value = group.name;
    input.addEventListener('mousedown', e => e.stopPropagation());
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        group.name = input.value;
        const oldEl = document.querySelector(`[data-drag-group="${groupId}"]`);
        if (oldEl) rebuildGroupElement(groupId, oldEl);
        hideContextMenu();
      }
      if (e.key === 'Escape') hideContextMenu();
      e.stopPropagation();
    });

    const colorRow = document.createElement('div');
    colorRow.className = 'ctx-color-row';
    GROUP_COLORS.forEach((entry, idx) => {
      const swatch = document.createElement('div');
      swatch.className = 'ctx-swatch'
        + (group.colorIdx === idx ? ' selected' : '')
        + (entry.swatch === null ? ' swatch-none' : '');
      if (entry.swatch) swatch.style.background = entry.swatch;
      swatch.addEventListener('mousedown', e => {
        e.stopPropagation();
        group.colorIdx = idx;
        group.color = entry.bg;
        applyGroupColor(groupId);
        colorRow.querySelectorAll('.ctx-swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
      });
      colorRow.appendChild(swatch);
    });

    header.appendChild(input);
    header.appendChild(colorRow);
    setTimeout(() => input.focus(), 0);
    return header;
  }

  function showContextMenu(items, x, y) {
    hideContextMenu();
    const menu = buildMenuEl(items);
    document.body.appendChild(menu);
    const mw = 200, mh = menu.offsetHeight;
    menu.style.left = (x + mw > window.innerWidth  ? x - mw : x) + 'px';
    menu.style.top  = (y + mh > window.innerHeight ? y - mh : y) + 'px';
    activeCtxMenu = menu;
  }

  // Action helpers
  function getExistingGroupIds() {
    return [...new Set(TABS.filter(t => t.groupId).map(t => t.groupId))];
  }

  function addToGroupSubmenu(targetTabIds) {
    const existing = getExistingGroupIds();
    const items = [
      { label: 'New Tab Group', action: () => createNewGroup(targetTabIds) },
    ];
    if (existing.length) {
      items.push('---');
      existing.forEach(gid => {
        items.push({
          label: GROUPS[gid].name,
          action: () => {
            targetTabIds.forEach(id => {
              const tab = TABS.find(t => t.id === id);
              if (tab) tab.groupId = gid;
            });
            renderAll();
          }
        });
      });
    }
    return items;
  }

  function createNewGroup(tabIds) {
    const groupId = 'grp_' + Date.now();
    GROUPS[groupId] = { name: 'Group', expanded: false, lastActive: null, color: null };
    tabIds.forEach(id => {
      const tab = TABS.find(t => t.id === id);
      if (tab) tab.groupId = groupId;
    });
    renderAll();
  }

  function closeTabById(tabId) {
    const idx = TABS.findIndex(t => t.id === tabId);
    if (idx >= 0) closeTab(idx);
  }

  function closeOtherTabs(keepTabId) {
    for (let i = TABS.length - 1; i >= 0; i--) {
      if (TABS[i].id !== keepTabId) closeTab(i);
    }
  }

  function closeAllTabs() {
    while (TABS.length > 0) closeTab(0);
  }

  // Menu builders
  function buildSingleTabMenu(tab) {
    const tabId = tab.id;
    return [
      { label: 'Copy Link', trail: '⌘L', action: () => {} },
      { label: 'Rename File', action: () => {} },
      { label: 'Reload Tab', action: () => {} },
      '---',
      { label: 'Move to New Window', action: () => {} },
      { label: 'Add to Tab Group', submenu: addToGroupSubmenu([tabId]) },
      '---',
      { label: 'Open in Split Tab', action: () => {} },
      { label: 'Pin Tab', action: () => {} },
      '---',
      { label: 'Close Tab', action: () => closeTabById(tabId) },
      { label: 'Close Other Tabs', action: () => closeOtherTabs(tabId) },
      { label: 'Close All Tabs', action: () => closeAllTabs() },
    ];
  }

  function buildSubTabMenu(tab) {
    const tabId = tab.id;
    const oldGroupId = tab.groupId;
    return [
      { label: 'Copy Link', trail: '⌘L', action: () => {} },
      { label: 'Rename File', action: () => {} },
      { label: 'Reload Tab', action: () => {} },
      '---',
      { label: 'Move to New Window', action: () => {} },
      { label: 'Remove from Tab Group', action: () => {
        tab.groupId = null;
        if (!TABS.some(t => t.groupId === oldGroupId)) delete GROUPS[oldGroupId];
        renderAll();
      }},
      { label: 'Add to New Tab Group', action: () => {
        tab.groupId = null;
        if (!TABS.some(t => t.groupId === oldGroupId)) delete GROUPS[oldGroupId];
        createNewGroup([tabId]);
      }},
      '---',
      { label: 'Open in Split Tab', action: () => {} },
      { label: 'Pin Tab', action: () => {} },
      '---',
      { label: 'Close Tab', action: () => closeTabById(tabId) },
      { label: 'Close Other Tabs', action: () => closeOtherTabs(tabId) },
      { label: 'Close All Tabs', action: () => closeAllTabs() },
    ];
  }

  function buildMultiTabMenu(tabIds) {
    return [
      { label: 'Copy Links', trail: '⌘L', action: () => {} },
      { label: 'Reload Tabs', action: () => {} },
      '---',
      { label: 'Move to New Window', action: () => {} },
      { label: 'Add to Tab Group', submenu: addToGroupSubmenu(tabIds) },
      '---',
      { label: 'Pin Tab', action: () => {} },
      '---',
      { label: 'Close Tabs', action: () => {
        const sorted = [...tabIds].sort((a, b) => TABS.findIndex(t=>t.id===b) - TABS.findIndex(t=>t.id===a));
        sorted.forEach(id => closeTabById(id));
      }},
      { label: 'Close Other Tabs', action: () => {
        const keep = new Set(tabIds);
        for (let i = TABS.length - 1; i >= 0; i--)
          if (!keep.has(TABS[i].id)) closeTab(i);
      }},
      { label: 'Close All Tabs', action: () => closeAllTabs() },
    ];
  }

  function buildGroupMenu(groupId) {
    return [
      { type: 'group-header', groupId },
      '---',
      { label: 'Move to New Window', action: () => {} },
      '---',
      { label: 'Ungroup', action: () => {
        TABS.filter(t => t.groupId === groupId).forEach(t => t.groupId = null);
        delete GROUPS[groupId];
        renderAll();
      }},
      { label: 'Delete group', action: () => {
        const idxs = [];
        TABS.forEach((t, i) => { if (t.groupId === groupId) idxs.push(i); });
        for (let i = idxs.length - 1; i >= 0; i--) closeTab(idxs[i]);
        if (GROUPS[groupId]) delete GROUPS[groupId];
        renderAll();
      }},
    ];
  }

  // Context menu trigger
  document.getElementById('tabsList').addEventListener('contextmenu', e => {
    e.preventDefault();
    const subTabEl = e.target.closest('.sub-tab');
    const groupEl  = e.target.closest('.group-tab');
    const tabEl    = e.target.closest('.tab');
    let items;

    if (groupEl && !subTabEl) {
      items = buildGroupMenu(groupEl.dataset.dragGroup);
    } else if (subTabEl && groupEl && groupEl.classList.contains('expanded')) {
      const tabIdx = parseInt(subTabEl.dataset.id);
      items = buildSubTabMenu(TABS[tabIdx]);
    } else if (tabEl) {
      const dragIdx = parseInt(tabEl.dataset.dragIdx);
      const tab = TABS[dragIdx];
      if (selectedTabIds.size > 1 && selectedTabIds.has(tab.id)) {
        items = buildMultiTabMenu([...selectedTabIds]);
      } else {
        selectedTabIds.clear();
        items = buildSingleTabMenu(tab);
      }
    } else {
      return;
    }

    showContextMenu(items, e.clientX, e.clientY);
  });

  document.addEventListener('mousedown', e => {
    if (activeCtxMenu && !activeCtxMenu.contains(e.target)) hideContextMenu();
  }, true);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && activeCtxMenu) hideContextMenu();
  });

  // ── Init ───────────────────────────────────────────────────
  document.getElementById('tabstrip').addEventListener('mouseleave', unfreezeTabs);
  renderAll();
</script>
</body>
</html>
